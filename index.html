<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeAreDevs · Script Deobfuscator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6c5ce7;
            --primary-dark: #5a4bd1;
            --secondary: #00cec9;
            --accent: #fd79a8;
            --bg-primary: #0a0a0f;
            --bg-card: rgba(20, 20, 30, 0.85);
            --text-primary: #e8e8f0;
            --text-secondary: #a0a0b8;
            --border-color: rgba(108, 92, 231, 0.2);
            --glow-primary: 0 0 30px rgba(108, 92, 231, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text-primary);
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(108, 92, 231, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(0, 206, 201, 0.06) 0%, transparent 50%);
            z-index: 0;
        }

        .deobfuscator-card {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            width: 100%;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 40px 45px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), var(--glow-primary);
            border: 1px solid var(--border-color);
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .header-icon {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            box-shadow: 0 8px 25px rgba(108, 92, 231, 0.4);
        }

        .header h1 {
            font-weight: 800;
            font-size: 28px;
            background: linear-gradient(135deg, #ffffff 0%, var(--secondary) 50%, var(--primary) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-right: auto;
        }

        .badge {
            background: rgba(108, 92, 231, 0.15);
            padding: 6px 16px;
            border-radius: 60px;
            font-size: 12px;
            font-weight: 600;
            color: var(--secondary);
            border: 1px solid rgba(0, 206, 201, 0.2);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stats-bar {
            display: flex;
            gap: 25px;
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            flex-wrap: wrap;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .stat-item i { color: var(--primary); font-size: 14px; }
        .stat-item .value { color: var(--text-primary); font-weight: 600; }

        textarea {
            width: 100%;
            min-height: 200px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 18px 22px;
            font-family: 'Inter', 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.6;
            color: var(--text-primary);
            resize: vertical;
            transition: all 0.3s;
            box-shadow: inset 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.6);
        }

        .action-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            margin-top: 18px;
            margin-bottom: 20px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 10px 24px;
            font-weight: 600;
            font-size: 13px;
            color: var(--text-primary);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-color: var(--primary);
            color: white;
            box-shadow: 0 4px 20px rgba(108, 92, 231, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(108, 92, 231, 0.5);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .status-badge {
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 16px;
            border-radius: 60px;
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }

        .status-badge .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-badge .dot.ready { background: var(--secondary); }
        .status-badge .dot.processing { background: var(--primary); animation: pulse 0.5s infinite; }
        .status-badge .dot.done { background: #00b894; }
        .status-badge .dot.error { background: var(--accent); }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .output-area {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .output-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 18px 8px 18px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .output-header span {
            font-weight: 600;
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .output-header span i { color: var(--primary); }

        .output-actions { display: flex; gap: 8px; }

        .output-actions .btn-sm {
            padding: 4px 14px;
            font-size: 11px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .output-actions .btn-sm:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        #outputBox {
            width: 100%;
            min-height: 180px;
            background: rgba(0, 0, 0, 0.5);
            border: none;
            border-radius: 12px;
            padding: 18px 22px;
            font-family: 'Inter', 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.7;
            color: var(--text-primary);
            resize: vertical;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        #outputBox:focus { outline: none; background: rgba(0, 0, 0, 0.7); }

        .footer {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-secondary);
            flex-wrap: wrap;
            gap: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 16px;
        }

        .footer .footer-left { display: flex; align-items: center; gap: 16px; }
        .footer .footer-left i { color: var(--primary); margin-right: 4px; }
        .footer .footer-right { display: flex; align-items: center; gap: 12px; }

        .footer .footer-right .tech-badge {
            background: rgba(255, 255, 255, 0.05);
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 10px;
            color: var(--text-secondary);
        }

        .tooltip {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0, 0, 0, 0.9);
            color: var(--text-primary);
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 13px;
            border: 1px solid var(--border-color);
            opacity: 0;
            transition: all 0.5s;
            z-index: 1000;
            pointer-events: none;
        }

        .tooltip.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        @media (max-width: 768px) {
            .deobfuscator-card { padding: 20px; }
            .header h1 { font-size: 20px; }
            .stats-bar { gap: 12px; padding: 10px 14px; }
            .action-bar { flex-direction: column; align-items: stretch; }
            .btn { justify-content: center; }
            .status-badge { margin-left: 0; justify-content: center; }
            textarea, #outputBox { min-height: 120px; font-size: 12px; padding: 14px 16px; }
            .footer { flex-direction: column; align-items: center; text-align: center; }
        }

        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.03); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--secondary); }
    </style>
</head>
<body>

    <div class="tooltip" id="tooltip"></div>

    <div class="deobfuscator-card">
        <div class="header">
            <div class="header-icon"><i class="fas fa-skull"></i></div>
            <h1>WeAreDevs <span>Deobfuscator</span></h1>
            <div class="badge"><i class="fas fa-bolt"></i> v4.0</div>
        </div>

        <div class="stats-bar">
            <div class="stat-item"><i class="fas fa-microchip"></i> Engine: <span class="value">Advanced</span></div>
            <div class="stat-item"><i class="fas fa-bolt"></i> Status: <span class="value" id="engineStatus">Ready</span></div>
            <div class="stat-item"><i class="fas fa-code"></i> Processed: <span class="value" id="processedCount">0</span></div>
        </div>

        <div class="input-area">
            <textarea id="inputScript" placeholder="// Paste your WeAreDevs obfuscated script here..."></textarea>
        </div>

        <div class="action-bar">
            <button class="btn btn-primary" id="deobfuscateBtn"><i class="fas fa-wand-magic-sparkles"></i> Deobfuscate</button>
            <button class="btn btn-secondary" id="clearBtn"><i class="fas fa-eraser"></i> Clear</button>
            <button class="btn btn-secondary" id="sampleBtn"><i class="fas fa-file-lines"></i> Sample</button>
            <div class="status-badge">
                <span class="dot ready" id="statusDot"></span>
                <span id="statusText">Ready</span>
            </div>
        </div>

        <div class="output-area">
            <div class="output-header">
                <span><i class="fas fa-arrow-right"></i> Deobfuscated Output <span style="font-weight:400;font-size:10px;color:var(--text-secondary);">(Ctrl+Enter)</span></span>
                <div class="output-actions">
                    <button class="btn-sm" id="copyBtn"><i class="fas fa-copy"></i> Copy</button>
                    <button class="btn-sm" id="selectBtn"><i class="fas fa-select-all"></i> Select</button>
                </div>
            </div>
            <textarea id="outputBox" placeholder="Deobfuscated script will appear here..." readonly></textarea>
        </div>

        <div class="footer">
            <div class="footer-left">
                <span><i class="fas fa-shield-check" style="color: var(--secondary);"></i> 100% Client-Side</span>
                <span><i class="fas fa-bolt"></i> Handles WeAreDevs v1.0+</span>
            </div>
            <div class="footer-right">
                <span class="tech-badge"><i class="fas fa-lock"></i> Secure</span>
                <span class="tech-badge"><i class="fas fa-rocket"></i> Fast</span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            "use strict";

            const inputEl = document.getElementById('inputScript');
            const outputEl = document.getElementById('outputBox');
            const deobfBtn = document.getElementById('deobfuscateBtn');
            const clearBtn = document.getElementById('clearBtn');
            const sampleBtn = document.getElementById('sampleBtn');
            const copyBtn = document.getElementById('copyBtn');
            const selectBtn = document.getElementById('selectBtn');
            const statusText = document.getElementById('statusText');
            const statusDot = document.getElementById('statusDot');
            const engineStatus = document.getElementById('engineStatus');
            const processedCount = document.getElementById('processedCount');
            const tooltip = document.getElementById('tooltip');

            let processedScripts = 0;
            let tooltipTimeout;

            function showTooltip(message, isError = false) {
                tooltip.textContent = message;
                tooltip.style.borderColor = isError ? 'var(--accent)' : 'var(--secondary)';
                tooltip.classList.add('show');
                clearTimeout(tooltipTimeout);
                tooltipTimeout = setTimeout(() => tooltip.classList.remove('show'), 2500);
            }

            function setStatus(text, type = 'ready') {
                statusText.textContent = text;
                statusDot.className = 'dot ' + type;
                engineStatus.textContent = text;
            }

            function updateOutput(text) {
                outputEl.value = text;
                outputEl.style.height = 'auto';
                outputEl.style.height = Math.min(outputEl.scrollHeight, 400) + 'px';
            }

            // --- Real WeAreDevs Deobfuscator ---
            function deobfuscateWeAreDevs(code) {
                if (!code || code.trim() === '') {
                    return '⚠️ Nothing to deobfuscate — please paste a script first.';
                }

                let result = code;
                let changes = 0;
                let maxIterations = 50;
                let iteration = 0;

                // Function to decode string.char with proper handling
                function decodeStringChar(match, args) {
                    try {
                        // Handle both (72,101,108) and {72,101,108} formats
                        const cleanArgs = args.replace(/[{}()]/g, '');
                        const numbers = cleanArgs.split(',').map(s => parseInt(s.trim(), 10));
                        if (numbers.some(isNaN)) return match;
                        changes++;
                        return numbers.map(n => String.fromCharCode(n)).join('');
                    } catch (_) { return match; }
                }

                // Function to decode base64
                function decodeBase64(match, b64) {
                    try {
                        const decoded = atob(b64);
                        changes++;
                        return decoded;
                    } catch (_) { return match; }
                }

                // Iterative decoding - run multiple passes
                while (iteration < maxIterations) {
                    let previous = result;
                    
                    // 1. Decode string.char()
                    result = result.replace(/string\.char\s*[({]\s*([\d,\s]+)\s*[)}]/gi, decodeStringChar);
                    
                    // 2. Decode base64 in loadstring
                    result = result.replace(/loadstring\s*\(\s*["']([A-Za-z0-9+/=]+)["']\s*\)/gi, decodeBase64);
                    
                    // 3. Decode base64 assignments
                    result = result.replace(/local\s+(\w+)\s*=\s*["']([A-Za-z0-9+/=]+)["']/g, (match, varName, b64) => {
                        if (b64.length > 8 && /^[A-Za-z0-9+/=]+$/.test(b64)) {
                            try {
                                const decoded = atob(b64);
                                changes++;
                                return `local ${varName} = "${decoded}"`;
                            } catch (_) { /* ignore */ }
                        }
                        return match;
                    });
                    
                    // 4. Decode octal sequences
                    result = result.replace(/\\\d{3}/g, (match) => {
                        try {
                            changes++;
                            return String.fromCharCode(parseInt(match.slice(1), 8));
                        } catch (_) { return match; }
                    });
                    
                    // 5. Decode hex sequences
                    result = result.replace(/\\x([0-9a-fA-F]{2})/g, (match, hex) => {
                        try {
                            changes++;
                            return String.fromCharCode(parseInt(hex, 16));
                        } catch (_) { return match; }
                    });
                    
                    // 6. Decode concatenated strings
                    result = result.replace(/(["'])([^\1]*?)\1\s*\.\.\s*(["'])([^\3]*?)\3/g, (match, q1, s1, q2, s2) => {
                        changes++;
                        return `"${s1}${s2}"`;
                    });
                    
                    // 7. Remove obfuscated comment blocks
                    result = result.replace(/--\[\[[\s\S]*?\]\]/g, (match) => {
                        changes++;
                        return '--[ REMOVED ]';
                    });
                    
                    // 8. Remove huge numeric arrays
                    result = result.replace(/\{\s*[\d,]+\s*\}/g, (match) => {
                        if (match.length > 100) {
                            changes++;
                            return '{ -- truncated -- }';
                        }
                        return match;
                    });
                    
                    // Clean up extra whitespace
                    result = result.split('\n').map(line => line.trimEnd()).join('\n');
                    result = result.replace(/\n{3,}/g, '\n\n');
                    
                    // If no changes, break
                    if (result === previous) break;
                    iteration++;
                }

                // Final cleanup
                result = result.replace(/\n{3,}/g, '\n\n');

                if (changes === 0 && result.trim() === code.trim()) {
                    return result + '\n\n-- [INFO] No obfuscation patterns detected.';
                }

                return result + `\n\n-- [DEOBFUSCATED] ${changes} transformations applied.`;
            }

            // --- Main Deobfuscate ---
            function runDeobfuscate() {
                const input = inputEl.value;
                if (!input.trim()) {
                    setStatus('Empty script', 'error');
                    showTooltip('⚠️ Please paste an obfuscated script first.', true);
                    updateOutput('⚠️ Nothing to deobfuscate — please paste a script first.');
                    return;
                }

                setStatus('Processing...', 'processing');
                deobfBtn.disabled = true;

                // Use setTimeout to prevent UI freeze
                setTimeout(() => {
                    try {
                        const start = performance.now();
                        const deobfuscated = deobfuscateWeAreDevs(input);
                        const elapsed = (performance.now() - start).toFixed(0);

                        processedScripts++;
                        processedCount.textContent = processedScripts;

                        updateOutput(deobfuscated);
                        setStatus(`Done (${elapsed}ms)`, 'done');
                        showTooltip(`✅ Deobfuscated successfully in ${elapsed}ms!`);

                    } catch (err) {
                        setStatus('Error', 'error');
                        showTooltip(`❌ Error: ${err.message}`, true);
                        updateOutput(`⚠️ Deobfuscation error:\n${err.message}`);
                    } finally {
                        deobfBtn.disabled = false;
                    }
                }, 50);
            }

            // --- Load Sample ---
            function loadSample() {
                const sample = `--[[ v1.0.0 https://wearedevs.net/obfuscator ]]
        local a = string.char(108,111,97,100,115,116,114,105,110,103)
        local b = "cHJpbnQoImhlbGxvIHdvcmxkISIp"
        local c = "bG9hZHN0cmluZyhiYXNlNjRfZGVjb2RlKQ=="
        loadstring("cHJpbnQoImRlY29kZWQgYmFzZTY0Iik=")()
        local d = "aGVsbG8gZnJvbSBkZXZlbG9wZXI="
        print("Script loaded successfully!")`;

                inputEl.value = sample;
                setStatus('Sample loaded', 'done');
                showTooltip('📄 Sample script loaded!');
                updateOutput('');
                inputEl.focus();
            }

            // --- Event Listeners ---
            deobfBtn.addEventListener('click', runDeobfuscate);

            clearBtn.addEventListener('click', function() {
                inputEl.value = '';
                updateOutput('');
                setStatus('Cleared', 'ready');
                showTooltip('🧹 Cleared');
                inputEl.focus();
            });

            sampleBtn.addEventListener('click', loadSample);

            copyBtn.addEventListener('click', function() {
                const text = outputEl.value;
                if (!text || text.trim() === '') {
                    showTooltip('⚠️ Nothing to copy', true);
                    return;
                }
                navigator.clipboard.writeText(text).then(() => {
                    showTooltip('✅ Copied!');
                }).catch(() => {
                    outputEl.select();
                    document.execCommand('copy');
                    showTooltip('✅ Copied!');
                });
            });

            selectBtn.addEventListener('click', function() {
                outputEl.select();
                showTooltip('📋 Selected');
            });

            inputEl.addEventListener('keydown', function(e) {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    e.preventDefault();
                    runDeobfuscate();
                }
            });

            setStatus('Ready', 'ready');
            processedCount.textContent = '0';

            setTimeout(() => {
                showTooltip('🚀 Ready! Paste your script and click Deobfuscate.');
            }, 800);
        })();
    </script>

</body>
</html>

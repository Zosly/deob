<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeAreDevs · script deobfuscator</title>
  <!-- Font & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0b0e14;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #e9edf5;
    }

    /* main card – glassmorphism + depth */
    .deobfuscator-card {
      max-width: 1000px;
      width: 100%;
      background: rgba(20, 26, 36, 0.75);
      backdrop-filter: blur(14px) saturate(180%);
      -webkit-backdrop-filter: blur(14px) saturate(180%);
      border-radius: 48px;
      padding: 40px 44px;
      box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.9), 
                  inset 0 1px 1px rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.03);
      transition: all 0.2s ease;
    }

    /* header */
    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .header-icon {
      background: #2f3b4e;
      width: 56px;
      height: 56px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #b7c9e2;
      box-shadow: inset 0 -4px 0 #1a212b;
    }

    .header h1 {
      font-weight: 700;
      font-size: 28px;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #f0f5ff 0%, #a0b8d9 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-right: auto;
    }

    .badge {
      background: #28303f;
      padding: 8px 16px;
      border-radius: 60px;
      font-size: 13px;
      font-weight: 600;
      color: #98aecb;
      border: 1px solid #3b465a;
      letter-spacing: 0.3px;
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge i {
      color: #6d8bb0;
    }

    /* textarea + buttons */
    .input-area {
      margin-bottom: 28px;
    }

    .input-area label {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
      font-size: 15px;
      color: #cbd8ed;
      margin-bottom: 12px;
      letter-spacing: 0.2px;
    }

    .input-area label i {
      color: #6282ac;
      font-size: 18px;
    }

    textarea {
      width: 100%;
      min-height: 200px;
      background: #11181f;
      border: 1px solid #29323f;
      border-radius: 24px;
      padding: 22px 24px;
      font-family: 'Inter', 'Fira Code', monospace;
      font-size: 14px;
      line-height: 1.6;
      color: #e1e9f5;
      resize: vertical;
      transition: 0.2s;
      box-shadow: inset 0 6px 12px rgba(0, 0, 0, 0.4);
      letter-spacing: 0.2px;
    }

    textarea:focus {
      outline: none;
      border-color: #4f7db3;
      background: #0f161f;
      box-shadow: 0 0 0 3px rgba(60, 120, 200, 0.2), inset 0 6px 12px rgba(0,0,0,0.5);
    }

    textarea::placeholder {
      color: #4d5f78;
      font-weight: 400;
      opacity: 0.7;
    }

    .action-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 16px 20px;
      margin-top: 22px;
      margin-bottom: 30px;
    }

    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .btn {
      background: #202a37;
      border: none;
      border-radius: 40px;
      padding: 12px 28px;
      font-weight: 600;
      font-size: 14px;
      color: #dfe8f5;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid #2f3b4c;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
      letter-spacing: 0.3px;
    }

    .btn i {
      font-size: 16px;
      color: #7f9bc2;
      transition: 0.2s;
    }

    .btn-primary {
      background: #3466a0;
      border-color: #4b7fc2;
      color: white;
      box-shadow: 0 6px 14px rgba(40, 90, 170, 0.3);
    }

    .btn-primary i {
      color: #c5ddff;
    }

    .btn-primary:hover {
      background: #3f79ba;
      border-color: #5f94d4;
      transform: scale(1.02);
      box-shadow: 0 8px 20px rgba(40, 90, 170, 0.5);
    }

    .btn-secondary {
      background: #1f2836;
      border-color: #364256;
    }

    .btn-secondary:hover {
      background: #2a3547;
      border-color: #4a5a74;
    }

    .btn-danger {
      background: #552e38;
      border-color: #76424f;
    }

    .btn-danger:hover {
      background: #6e3b48;
      border-color: #945a6a;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .output-area {
      background: #0f151e;
      border-radius: 28px;
      padding: 6px 6px 6px 6px;
      border: 1px solid #26303e;
      box-shadow: inset 0 4px 10px rgba(0, 0, 0, 0.5);
    }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 22px 10px 22px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .output-header span {
      font-weight: 600;
      font-size: 14px;
      color: #92a9ca;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .output-header span i {
      color: #4f719b;
    }

    .copy-btn {
      background: transparent;
      border: 1px solid #2a3548;
      border-radius: 30px;
      padding: 6px 18px;
      font-size: 13px;
      font-weight: 500;
      color: #b0c6e3;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: 0.2s;
      cursor: pointer;
      background: #1c2533;
    }

    .copy-btn:hover {
      background: #2b384d;
      border-color: #4a6382;
      color: #d6e4ff;
    }

    .copy-btn i {
      font-size: 14px;
    }

    #outputBox {
      width: 100%;
      min-height: 180px;
      background: #0b1119;
      border: none;
      border-radius: 22px;
      padding: 20px 24px;
      font-family: 'Inter', 'Fira Code', monospace;
      font-size: 14px;
      line-height: 1.7;
      color: #dce6f5;
      resize: vertical;
      transition: 0.2s;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.6);
      letter-spacing: 0.1px;
    }

    #outputBox:focus {
      outline: none;
      background: #0e1622;
    }

    .footer-note {
      margin-top: 24px;
      display: flex;
      justify-content: flex-end;
      font-size: 13px;
      color: #4c6180;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      border-top: 1px solid #1f2837;
      padding-top: 20px;
    }

    .footer-note i {
      color: #49638b;
      margin-right: 4px;
    }

    .status-badge {
      background: #1d2534;
      padding: 5px 14px;
      border-radius: 60px;
      font-size: 12px;
      color: #8ca3c7;
    }

    /* responsive */
    @media (max-width: 650px) {
      .deobfuscator-card {
        padding: 28px 20px;
        border-radius: 32px;
      }
      .header h1 {
        font-size: 22px;
      }
      .action-bar {
        flex-direction: column;
        align-items: stretch;
      }
      .btn-group {
        justify-content: stretch;
      }
      .btn {
        flex: 1;
        justify-content: center;
      }
      textarea, #outputBox {
        min-height: 150px;
      }
    }

    /* scroll */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #121b26;
      border-radius: 12px;
    }
    ::-webkit-scrollbar-thumb {
      background: #31455f;
      border-radius: 12px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #4b6b8f;
    }
  </style>
</head>
<body>
  <div class="deobfuscator-card">
    <!-- header -->
    <div class="header">
      <div class="header-icon"><i class="fas fa-skull"></i></div>
      <h1>wearedevs · deobfuscator</h1>
      <div class="badge">
        <i class="fas fa-shield-alt"></i> executor ready
      </div>
    </div>

    <!-- input -->
    <div class="input-area">
      <label for="inputScript">
        <i class="fas fa-code"></i> obfuscated script (WeAreDevs style)
      </label>
      <textarea id="inputScript" placeholder="paste the obfuscated script here ... usually starts with 'loadstring' or weird encoded strings">-- WeAreDevs obfuscated example
local a = "print('hello')"
local b = string.char(108,111,97,100,115,116,114,105,110,103)
local c = "aW5zZXJ0"
-- this is a dummy placeholder, paste your real obfuscated code</textarea>
    </div>

    <!-- actions -->
    <div class="action-bar">
      <div class="btn-group">
        <button class="btn btn-primary" id="deobfuscateBtn"><i class="fas fa-wand-magic-sparkles"></i> deobfuscate</button>
        <button class="btn btn-secondary" id="clearBtn"><i class="fas fa-eraser"></i> clear</button>
        <button class="btn btn-secondary" id="sampleBtn"><i class="fas fa-file-lines"></i> sample</button>
      </div>
      <div style="margin-left: auto; display: flex; gap: 10px;">
        <span class="status-badge" id="statusBadge"><i class="fas fa-circle" style="color: #4f7db3; font-size: 8px; vertical-align: middle;"></i> ready</span>
      </div>
    </div>

    <!-- output -->
    <div class="output-area">
      <div class="output-header">
        <span><i class="fas fa-arrow-right"></i> deobfuscated output</span>
        <button class="copy-btn" id="copyBtn"><i class="fas fa-copy"></i> copy</button>
      </div>
      <textarea id="outputBox" placeholder="deobfuscated script will appear here …" readonly></textarea>
    </div>

    <div class="footer-note">
      <span><i class="fas fa-triangle-exclamation" style="color: #b3874a;"></i> works with common WeAreDevs obfuscation patterns</span>
      <span><i class="fas fa-rotate-right"></i> v1.0 · executor ready</span>
    </div>
  </div>

  <script>
    (function() {
      "use strict";

      const inputEl = document.getElementById('inputScript');
      const outputEl = document.getElementById('outputBox');
      const deobfBtn = document.getElementById('deobfuscateBtn');
      const clearBtn = document.getElementById('clearBtn');
      const sampleBtn = document.getElementById('sampleBtn');
      const copyBtn = document.getElementById('copyBtn');
      const statusBadge = document.getElementById('statusBadge');

      // ----- deobfuscation engine (WeAreDevs style) -----
      function deobfuscateWeAreDevs(code) {
        if (!code || code.trim() === '') {
          return '⚠️  nothing to deobfuscate — paste a script first.';
        }

        let result = code;

        // 1. decode common string.char sequences (e.g. string.char(72,101,108,108,111) -> "Hello")
        //    this handles both 'string.char(...)' and 'string.char{...}' variations
        result = result.replace(/string\.char\s*\(\s*([\d,\s]+)\s*\)/gi, (match, args) => {
          try {
            const numbers = args.split(',').map(s => parseInt(s.trim(), 10));
            if (numbers.some(isNaN)) return match; // fallback
            return '"' + numbers.map(n => String.fromCharCode(n)).join('') + '"';
          } catch (_) { return match; }
        });

        // 2. loadstring + base64? (common pattern: loadstring( base64.decode(...) ) )
        //    simple heuristic: look for loadstring( ... ) and try to extract base64 inside
        //    we don't fully eval, but we can beautify the inner part.
        result = result.replace(/loadstring\s*\(\s*["']([^"']+)["']\s*\)/gi, (match, inner) => {
          // attempt to detect if it's base64 (contains only base64 chars + '=' padding)
          const isBase64 = /^[A-Za-z0-9+/]+=*$/.test(inner.trim());
          if (isBase64 && inner.length > 8) {
            try {
              const decoded = atob(inner);
              return `-- loadstring( base64 decode )\n${decoded}`;
            } catch (_) {
              return match; // keep as-is if decode fails
            }
          }
          return match;
        });

        // 3. remove common obfuscation patterns: --[[...]] with weird junk
        result = result.replace(/--\[\[[\s\S]*?\]\]/g, '--[ obfuscated block removed ]');

        // 4. clean up multiple empty lines, extra spaces
        result = result.split('\n').map(line => line.trimEnd()).join('\n');
        result = result.replace(/\n{3,}/g, '\n\n');

        // 5. decode base64 strings that are assigned to variables (heuristic)
        //    pattern: local x = "base64..."   (but we won't eval, just annotate)
        result = result.replace(/local\s+(\w+)\s*=\s*["']([A-Za-z0-9+/]+=*)["']/g, (match, varName, b64) => {
          if (b64.length > 12 && /^[A-Za-z0-9+/]+=*$/.test(b64)) {
            try {
              const decoded = atob(b64);
              return `local ${varName} = "${decoded}"  -- (decoded from base64)`;
            } catch (_) { /* ignore */ }
          }
          return match;
        });

        // 6. (extra) try to fix some obvious escaped sequences
        result = result.replace(/\\n/g, '\n').replace(/\\t/g, '\t').replace(/\\"/g, '"');

        // 7. if nothing changed, add a note
        if (result === code) {
          return result + '\n\n-- (no obvious WeAreDevs obfuscation patterns detected)';
        }

        return result;
      }

      // ----- UI helpers -----
      function setStatus(text, icon = 'fa-circle', color = '#4f7db3') {
        statusBadge.innerHTML = `<i class="fas ${icon}" style="color: ${color}; font-size: 8px; vertical-align: middle;"></i> ${text}`;
      }

      function updateOutput(text) {
        outputEl.value = text;
        // auto-resize (optional) but keep it readable
        outputEl.style.height = 'auto';
        outputEl.style.height = Math.min(outputEl.scrollHeight, 400) + 'px';
      }

      function runDeobfuscate() {
        const input = inputEl.value;
        if (!input.trim()) {
          setStatus('empty script', 'fa-circle-exclamation', '#b3874a');
          updateOutput('⚠️  Please paste an obfuscated script first.');
          return;
        }

        setStatus('deobfuscating...', 'fa-spinner fa-spin', '#b0c6e3');
        try {
          const start = performance.now();
          const deobfuscated = deobfuscateWeAreDevs(input);
          const elapsed = (performance.now() - start).toFixed(0);
          updateOutput(deobfuscated);
          setStatus(`done (${elapsed}ms)`, 'fa-check', '#5fa87f');
        } catch (err) {
          setStatus('error', 'fa-triangle-exclamation', '#c25a5a');
          updateOutput(`⚠️  Deobfuscation error: ${err.message || 'unknown'}`);
          console.warn('Deobfuscator error:', err);
        }
      }

      // ----- event listeners -----
      deobfBtn.addEventListener('click', runDeobfuscate);

      clearBtn.addEventListener('click', function() {
        inputEl.value = '';
        updateOutput('');
        setStatus('cleared', 'fa-circle', '#4f7db3');
        inputEl.focus();
      });

      sampleBtn.addEventListener('click', function() {
        const sample = `-- WeAreDevs typical obfuscated executor stub
local a = string.char(108,111,97,100,115,116,114,105,110,103)
local b = "cHJpbnQoImhlbGxvIGZyb20gZGVvYnVzY2F0b3IiKQ=="
local c = "aHR0cHM6Ly9leGFtcGxlLmNvbS9zY3JpcHQubHUA"
-- loadstring( base64 decode )
loadstring("cHJpbnQoImRlY29kZWQgYmFzZTY0Iik=")()
-- some garbage
--[[ obfuscated garbage ]]
local d = "c2NyaXB0IGZyb20gZGV2"
print("deobfuscate me!")`;
        inputEl.value = sample;
        updateOutput('');
        setStatus('sample loaded', 'fa-file-lines', '#6d8bb0');
        // auto-deobfuscate for convenience
        runDeobfuscate();
      });

      copyBtn.addEventListener('click', function() {
        const text = outputEl.value;
        if (!text || text.trim() === '') {
          setStatus('nothing to copy', 'fa-copy', '#b3874a');
          return;
        }
        navigator.clipboard.writeText(text).then(() => {
          setStatus('copied!', 'fa-check-circle', '#5fa87f');
          setTimeout(() => setStatus('ready', 'fa-circle', '#4f7db3'), 1800);
        }).catch(() => {
          // fallback
          outputEl.select();
          document.execCommand('copy');
          setStatus('copied (fallback)', 'fa-check', '#5fa87f');
          setTimeout(() => setStatus('ready', 'fa-circle', '#4f7db3'), 1800);
        });
      });

      // Ctrl+Enter shortcut
      inputEl.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
          e.preventDefault();
          runDeobfuscate();
        }
      });

      // initial status
      setStatus('ready', 'fa-circle', '#4f7db3');
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>untitled</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #000000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            background: #0a0a0c;
            cursor: crosshair;
        }

        /* only button: black, sharp corners, no bullshit */
        .trigger-wrapper {
            position: fixed;
            bottom: 32px;
            right: 32px;
            z-index: 20;
            opacity: 0.85;
            transition: opacity 0.2s;
        }
        .trigger-wrapper:hover {
            opacity: 1;
        }

        .black-button {
            background: #000000;
            border: 1.5px solid #2c2c2c;
            color: #cccccc;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            font-weight: 600;
            padding: 12px 28px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.15s ease;
            text-transform: uppercase;
            box-shadow: none;
            border-radius: 0px;
            backdrop-filter: none;
        }

        .black-button:hover {
            background: #111111;
            border-color: #6a1a1a;
            color: #e0e0e0;
        }

        .black-button:active {
            transform: scale(0.97);
        }

        /* no rounded corners anywhere, no panels */
        @media (max-width: 640px) {
            .trigger-wrapper {
                bottom: 20px;
                right: 20px;
            }
            .black-button {
                padding: 8px 20px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <canvas id="brutalCanvas"></canvas>
    <div class="trigger-wrapper">
        <button id="carelessBtn" class="black-button">i don't care</button>
    </div>

    <script>
        (function() {
            // ---------- FULLSCREEN CANVAS ----------
            const canvas = document.getElementById('brutalCanvas');
            const ctx = canvas.getContext('2d');
            
            let width, height;
            
            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }
            window.addEventListener('resize', () => {
                resizeCanvas();
                updateCharacterPositions();
            });
            resizeCanvas();
            
            // ---------- STATE ----------
            let hasActed = false;           // shot himself
            let actingPhase = 0;            // 0 = idle, 1 = shaking/blur active, 2 = fade out, 3 = exit
            let shakeIntensity = 0;
            let blurAmount = 0;
            let fadeOpacity = 0;             // 0 = fully visible, 1 = fully white/black fade
            let bloodParticles = [];          // blood pool & splatter (realistic floor blood)
            let ragdollAngle = 0;             // for body slump / rotation
            let ragdollOffsetY = 0;
            let frameCounter = 0;
            
            // ---------- CHARACTER: fully black without features, rectangular arms, Z on head ----------
            let character = {
                headX: 0, headY: 0,
                bodyX: 0, bodyY: 0,
                leftArmX1: 0, leftArmY1: 0, leftArmX2: 0, leftArmY2: 0,
                rightArmX1: 0, rightArmY1: 0, rightArmX2: 0, rightArmY2: 0,
                gunX: 0, gunY: 0
            };
            
            function updateCharacterPositions() {
                character.headX = width * 0.5;
                character.headY = height * 0.38;
                character.bodyX = width * 0.5;
                character.bodyY = height * 0.66;
                
                // rectangular arms (simple rectangles)
                // left arm: from shoulder to left side (relaxed)
                character.leftArmX1 = character.bodyX - 38;
                character.leftArmY1 = character.bodyY - 20;
                character.leftArmX2 = character.bodyX - 70;
                character.leftArmY2 = character.bodyY + 35;
                
                // right arm (holding gun to head, rectangular)
                character.rightArmX1 = character.bodyX + 32;
                character.rightArmY1 = character.bodyY - 18;
                character.rightArmX2 = character.bodyX + 70;
                character.rightArmY2 = character.headY - 12;
                
                // gun position (near temple)
                character.gunX = character.headX + 38;
                character.gunY = character.headY - 8;
            }
            
            // ---------- BLOOD SYSTEM (realistic deep red, flows on floor) ----------
            function addBloodSplatter(x, y, isFloor = true) {
                const amount = isFloor ? 18 : 12;
                for(let i=0; i<amount; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const distance = Math.random() * (isFloor ? 70 : 45);
                    const offsetX = Math.cos(angle) * distance * (Math.random() * 0.8 + 0.3);
                    const offsetY = Math.sin(angle) * distance * (Math.random() * 0.5 + 0.2);
                    bloodParticles.push({
                        x: x + offsetX,
                        y: y + offsetY + (isFloor ? 12 : 0),
                        radius: Math.random() * 6 + 3,
                        alpha: 0.95,
                        isFloor: true,
                        life: 1.0
                    });
                }
                // additional pool under head
                for(let i=0;i<32;i++) {
                    bloodParticles.push({
                        x: x + (Math.random() - 0.5) * 85,
                        y: y + 15 + Math.random() * 25,
                        radius: Math.random() * 9 + 4,
                        alpha: 0.9,
                        isFloor: true,
                        life: 1.0
                    });
                }
            }
            
            function updateBlood() {
                for(let i=0; i<bloodParticles.length; i++) {
                    bloodParticles[i].life -= 0.003;
                    if(bloodParticles[i].life <= 0.02 || bloodParticles[i].y > height + 40) {
                        bloodParticles.splice(i,1);
                        i--;
                    }
                }
            }
            
            function drawBlood() {
                for(let b of bloodParticles) {
                    ctx.save();
                    ctx.shadowBlur = 0;
                    ctx.beginPath();
                    ctx.ellipse(b.x, b.y, b.radius, b.radius * 0.7, 0, 0, Math.PI*2);
                    // deep crimson red
                    ctx.fillStyle = `rgba(100, 12, 12, ${b.alpha * 0.9})`;
                    ctx.fill();
                    // darker core
                    ctx.beginPath();
                    ctx.ellipse(b.x-1, b.y-1, b.radius*0.45, b.radius*0.4, 0, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(55, 5, 5, 0.8)`;
                    ctx.fill();
                    ctx.restore();
                }
            }
            
            // ---------- DRAW FULLY BLACK FIGURE (no features, rectangular arms, Z on head) ----------
            function drawBlackFigure() {
                const hX = character.headX;
                const hY = character.headY;
                const bX = character.bodyX;
                const bY = character.bodyY;
                const isDead = hasActed;
                
                // apply ragdoll transformation if shot
                ctx.save();
                if(isDead && ragdollAngle !== 0) {
                    ctx.translate(bX, bY + 20);
                    ctx.rotate(ragdollAngle * 0.6);
                    ctx.translate(-bX, -(bY + 20));
                }
                
                // TORSO (solid black, rectangular shape)
                ctx.fillStyle = "#000000";
                ctx.fillRect(bX-40, bY-28, 80, 130);
                
                // LEGS (rectangular)
                ctx.fillRect(bX-32, bY+95, 28, 72);
                ctx.fillRect(bX+4, bY+95, 28, 72);
                
                // NECK (black)
                ctx.fillRect(hX-14, hY+22, 28, 20);
                
                // HEAD (round but pure black)
                ctx.beginPath();
                ctx.arc(hX, hY, 34, 0, Math.PI*2);
                ctx.fillStyle = "#000000";
                ctx.fill();
                ctx.strokeStyle = "#1a1a1a";
                ctx.lineWidth = 1;
                ctx.stroke();
                
                // ----- Z LETTER on head (bold white/grey) -----
                ctx.font = `bold 44px "Courier New", monospace`;
                ctx.fillStyle = "#3a3a3a";
                ctx.shadowBlur = 0;
                ctx.fillText("Z", hX - 22, hY + 16);
                ctx.fillStyle = "#5a5a5a";
                ctx.fillText("Z", hX - 24, hY + 14);
                ctx.fillStyle = "#aaaaaa";
                ctx.font = `bold 38px monospace`;
                ctx.fillText("Z", hX - 22, hY + 14);
                
                // LEFT ARM (rectangular, solid black)
                ctx.fillStyle = "#000000";
                ctx.fillRect(character.leftArmX1, character.leftArmY1, 22, 32);
                ctx.fillRect(character.leftArmX2, character.leftArmY2, 24, 28);
                
                // RIGHT ARM (rectangular arm holding gun to head)
                ctx.fillStyle = "#000000";
                ctx.fillRect(character.rightArmX1, character.rightArmY1, 26, 28);
                ctx.fillRect(character.rightArmX2-10, character.rightArmY2, 24, 18);
                
                // GUN (dark grey rectangle, no funny details)
                if(!isDead) {
                    ctx.fillStyle = "#2a2a2a";
                    ctx.fillRect(character.gunX-20, character.gunY-5, 32, 12);
                    ctx.fillStyle = "#151515";
                    ctx.fillRect(character.gunX-8, character.gunY-9, 12, 20);
                    ctx.fillStyle = "#111";
                    ctx.fillRect(character.gunX-4, character.gunY-3, 24, 8);
                } else {
                    // fallen gun on floor after death
                    ctx.fillStyle = "#2c2c2c";
                    ctx.fillRect(bX+34, bY+130, 42, 10);
                    ctx.fillRect(bX+52, bY+123, 14, 18);
                }
                
                ctx.restore();
            }
            
            // ---------- RAGDOLL & BLOOD EFFECTS ON SHOOT ----------
            function startShootSequence() {
                if(hasActed) return;
                hasActed = true;
                actingPhase = 1;   // shake + blur phase
                shakeIntensity = 16;
                blurAmount = 12;
                frameCounter = 0;
                
                // add massive blood splatter from head region
                const headPosX = character.headX;
                const headPosY = character.headY + 8;
                addBloodSplatter(headPosX, headPosY, true);
                // extra directional blood spray
                for(let i=0;i<45;i++) {
                    const angle = (Math.random() - 0.5) * Math.PI;
                    const dist = Math.random() * 55;
                    bloodParticles.push({
                        x: headPosX + Math.cos(angle) * dist * 0.7,
                        y: headPosY + Math.sin(angle) * dist * 0.9 + 5,
                        radius: Math.random() * 7 + 2,
                        alpha: 0.95,
                        isFloor: true,
                        life: 1.0
                    });
                }
                // large pool under body
                for(let i=0;i<50;i++) {
                    bloodParticles.push({
                        x: character.bodyX + (Math.random() - 0.5) * 90,
                        y: character.bodyY + 40 + Math.random() * 50,
                        radius: Math.random() * 9 + 5,
                        alpha: 0.92,
                        isFloor: true,
                        life: 1.0
                    });
                }
                // ragdoll angles: body slumps forward
                ragdollAngle = -0.38;
                ragdollOffsetY = 18;
                
                // disable button
                const btn = document.getElementById('carelessBtn');
                if(btn) {
                    btn.disabled = true;
                    btn.style.opacity = "0.4";
                    btn.style.cursor = "default";
                    btn.innerText = "---";
                }
            }
            
            // ---------- UPDATE SHAKE, BLUR & FADE OUT, FINAL KICK ----------
            let exitTriggered = false;
            
            function updatePostProcessing() {
                if(actingPhase === 1) {
                    // shake & blur decay
                    shakeIntensity *= 0.92;
                    blurAmount *= 0.94;
                    frameCounter++;
                    if(blurAmount < 0.8 && shakeIntensity < 0.6) {
                        actingPhase = 2;   // start fade out
                        fadeOpacity = 0;
                    }
                }
                else if(actingPhase === 2) {
                    // fade out to black, then kick user
                    fadeOpacity += 0.018;
                    if(fadeOpacity >= 1.0) {
                        fadeOpacity = 1.0;
                        actingPhase = 3;
                        // exit the page after slight delay
                        setTimeout(() => {
                            if(!exitTriggered) {
                                exitTriggered = true;
                                // KICK USER FROM THE WEB: close tab/window (most modern browsers allow only if triggered by user gesture but we initiate location replace)
                                // using a destructive redirect or closing approach
                                document.body.innerHTML = "";
                                window.stop();
                                // attempt to close window (may not work in all browsers but forceful redirect)
                                window.location.replace("about:blank");
                                setTimeout(() => {
                                    window.close();
                                }, 50);
                            }
                        }, 200);
                    }
                }
                
                // ragdoll settle after death
                if(hasActed && actingPhase < 2) {
                    ragdollAngle += ( -0.45 - ragdollAngle ) * 0.07;
                    if(ragdollAngle < -0.48) ragdollAngle = -0.48;
                }
            }
            
            // apply canvas blur and shake effect
            function applyShakeAndBlur() {
                if(actingPhase === 1 && (shakeIntensity > 0.5 || blurAmount > 0.3)) {
                    const dx = (Math.random() - 0.5) * shakeIntensity;
                    const dy = (Math.random() - 0.5) * shakeIntensity * 0.8;
                    canvas.style.transform = `translate(${dx}px, ${dy}px)`;
                    // blur filter
                    let blurValue = Math.min(blurAmount, 9);
                    if(blurValue > 0.3) {
                        canvas.style.filter = `blur(${blurValue}px)`;
                    } else {
                        canvas.style.filter = "none";
                    }
                } else {
                    canvas.style.transform = "";
                    if(actingPhase !== 1) canvas.style.filter = "";
                }
            }
            
            // draw fade overlay (final fade out)
            function drawFadeOverlay() {
                if(actingPhase >= 2 && fadeOpacity > 0) {
                    ctx.fillStyle = `rgba(0, 0, 0, ${Math.min(fadeOpacity, 0.99)})`;
                    ctx.fillRect(0, 0, width, height);
                }
            }
            
            // ---------- BACKGROUND: minimal dark gritty ----------
            function drawBackground() {
                const grad = ctx.createLinearGradient(0, 0, 0, height);
                grad.addColorStop(0, "#0c0c10");
                grad.addColorStop(1, "#12141c");
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, width, height);
                // concrete texture
                ctx.fillStyle = "rgba(20,20,28,0.4)";
                for(let i=0;i<180;i++) {
                    ctx.fillRect((i*131)%width, (i*97)%height, 1.2, 1.2);
                }
                // floor line shadow
                ctx.beginPath();
                ctx.moveTo(0, height*0.72);
                ctx.lineTo(width, height*0.69);
                ctx.strokeStyle = "#1e1a1a";
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            
            // ---------- DRAW BLOOD FLOOR POOL (dynamic) ----------
            function drawBloodFloor() {
                for(let b of bloodParticles) {
                    if(b.isFloor) {
                        ctx.beginPath();
                        ctx.ellipse(b.x, b.y, b.radius, b.radius * 0.6, 0, 0, Math.PI*2);
                        ctx.fillStyle = `rgba(85, 10, 10, ${b.alpha * 0.85})`;
                        ctx.fill();
                        ctx.beginPath();
                        ctx.ellipse(b.x-2, b.y-1, b.radius*0.5, b.radius*0.4, 0, 0, Math.PI*2);
                        ctx.fillStyle = `rgba(45, 5, 5, 0.9)`;
                        ctx.fill();
                    }
                }
            }
            
            // draw additional blood smears on floor after death
            function drawExtraBloodTrail() {
                if(hasActed) {
                    ctx.fillStyle = "#691212";
                    for(let i=0;i<28;i++) {
                        ctx.beginPath();
                        ctx.ellipse(character.bodyX - 15 + (i*4), character.bodyY + 70 + Math.sin(i)*12, 7, 3, 0, 0, Math.PI*2);
                        ctx.fill();
                    }
                }
            }
            
            // ---------- MAIN RENDER LOOP ----------
            let animationFrameId;
            
            function render() {
                if (!ctx) return;
                if (width === 0 || height === 0) {
                    resizeCanvas();
                    updateCharacterPositions();
                }
                
                // update positions on resize
                updateCharacterPositions();
                
                // Update blood and post processing
                updateBlood();
                updatePostProcessing();
                
                // draw everything
                drawBackground();
                drawBloodFloor();
                drawExtraBloodTrail();
                drawBlackFigure();
                drawBlood();        // extra fresh blood splatter on top
                
                // If dead, additional pool under head and body
                if(hasActed) {
                    ctx.fillStyle = "#6b1414cc";
                    ctx.beginPath();
                    ctx.ellipse(character.headX, character.headY+38, 45, 22, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = "#541010cc";
                    ctx.beginPath();
                    ctx.ellipse(character.bodyX, character.bodyY+70, 55, 28, 0, 0, Math.PI*2);
                    ctx.fill();
                }
                
                drawFadeOverlay();
                
                // apply screen shake / blur effect
                applyShakeAndBlur();
                
                animationFrameId = requestAnimationFrame(render);
            }
            
            // ---------- BUTTON EVENT & FINAL EXIT HANDLER ----------
            function init() {
                resizeCanvas();
                updateCharacterPositions();
                
                const button = document.getElementById('carelessBtn');
                if(button) {
                    button.addEventListener('click', (e) => {
                        e.preventDefault();
                        if(!hasActed) {
                            startShootSequence();
                        }
                    });
                }
                
                // pre-start blood (none)
                render();
            }
            
            // also ensure that after fade out -> kick user is already handled in updatePostProcessing
            // additional cleanup: if user tries to refresh, we already have location replace.
            init();
            
            // final fail-safe kick if acting phase 3 doesn't fire? but it's covered
            window.addEventListener("beforeunload", (e) => {
                if(hasActed && actingPhase >= 2) {
                    // we don't need to show prompt, just continue exit
                }
            });
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WEIRD CEREMONY - The Unserious Button</title>
    <style>
        * {
            user-select: none;
            cursor: crosshair;
        }
        body {
            background: repeating-linear-gradient(45deg, #2a2a2f 0px, #2a2a2f 20px, #1e1e26 20px, #1e1e26 40px);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'Comic Sans MS', 'Papyrus', monospace;
            margin: 0;
            padding: 20px;
        }

        .weird-container {
            background: #f0e2b6;
            border-radius: 80px 20px 80px 20px;
            padding: 20px 30px 30px 30px;
            box-shadow: 12px 18px 0 #8a6eff, -4px -4px 0 #ffaa88, inset 0 0 0 3px #fffcdd;
            border: 2px solid #ff66aa;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 38px 10px 58px 10px;
            box-shadow: 6px 10px 0 #3a2a4e;
            background-color: #f7e9cf;
        }

        .button-area {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 25px;
            gap: 20px;
            flex-wrap: wrap;
        }

        .weird-btn {
            background: radial-gradient(circle at 20% 35%, #ffdd88, #ff8855);
            border: 4px ridge #ff44aa;
            font-size: 1.9rem;
            font-weight: bold;
            font-family: 'Courier New', 'Comic Sans MS', monospace;
            padding: 10px 32px;
            border-radius: 60px;
            color: #2f004f;
            text-shadow: 2px 2px 0 #ffc2a1;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.05s linear;
            box-shadow: 0 8px 0 #a1442a;
            transform: rotate(-1deg);
        }
        .weird-btn:active {
            transform: translateY(5px) rotate(0deg);
            box-shadow: 0 3px 0 #a1442a;
        }

        .bizarre-sign {
            background: #000000aa;
            backdrop-filter: blur(8px);
            padding: 6px 20px;
            border-radius: 100px;
            font-family: 'Papyrus', fantasy;
            font-weight: bold;
            font-size: 0.95rem;
            color: #f6ffb0;
            border-left: 6px solid #ff66c0;
            border-right: 6px solid #00ffc3;
        }

        .caption {
            text-align: center;
            margin-top: 15px;
            font-size: 0.75rem;
            background: #fff6e0;
            display: inline-block;
            width: auto;
            padding: 4px 20px;
            border-radius: 30px;
            font-weight: bold;
            color: #aa44aa;
            font-family: monospace;
        }
        footer {
            display: flex;
            justify-content: center;
        }

        @keyframes wobble {
            0% { transform: translate(0px, 0px) rotate(0deg);}
            25% { transform: translate(2px, -1px) rotate(1deg);}
            75% { transform: translate(-1px, 1px) rotate(-1deg);}
            100% { transform: translate(0px, 0px);}
        }
    </style>
</head>
<body>
<div>
    <div class="weird-container">
        <canvas id="absurdCanvas" width="800" height="500" style="width:800px;height:500px"></canvas>
        <div class="button-area">
            <div class="bizarre-sign" id="weirdMessage">~ DIE WORDS FLOATING ~</div>
            <button class="weird-btn" id="sillyTriggerBtn">I DON'T CARE</button>
        </div>
        <div class="caption">
            [ weird theatrical zone | clicking the button triggers a very unusual reaction ]
        </div>
    </div>
</div>

<script>
    (function(){
        const canvas = document.getElementById('absurdCanvas');
        const ctx = canvas.getContext('2d');
        const W = 800, H = 500;

        // STATE
        let hasPerformedAction = false;    // the "shot himself" but in absurd silly way
        let meltdownTimer = 0;             // post-click chaos frames
        
        // "Die" word array: random color only red or black, random positions
        let dieWords = [];
        const MAX_DIE = 16;
        let spawnInterval;
        
        // floating "SUICIDE" word rotation around body
        let suicideRotationAngle = 0;
        
        // character silly animation
        let headBob = 0;
        
        // helper random
        const rand = (min, max) => Math.floor(Math.random() * (max - min + 1) + min);
        
        // spawn DIE word (only red or black)
        function spawnDieWord() {
            if (dieWords.length >= MAX_DIE + 2) dieWords.shift();
            const x = rand(30, W - 60);
            const y = rand(40, H - 80);
            // only red or black
            const color = Math.random() < 0.5 ? "#e34234" : "#121212";
            dieWords.push({
                x, y, color,
                size: rand(20, 46),
                wiggleSeed: Math.random() * Math.PI * 2,
                createdAt: Date.now()
            });
            const msgDiv = document.getElementById("weirdMessage");
            msgDiv.innerHTML = "! DIE appears (red or black) !";
            setTimeout(() => {
                if (!hasPerformedAction) msgDiv.innerHTML = "~ DIE WORDS FLOATING ~";
                else msgDiv.innerHTML = "[ FINAL ECHO ]";
            }, 1400);
        }
        
        function startDieSpawning() {
            if (spawnInterval) clearInterval(spawnInterval);
            spawnInterval = setInterval(() => {
                if (!hasPerformedAction) {
                    spawnDieWord();
                    if (Math.random() < 0.45 && dieWords.length < MAX_DIE) spawnDieWord();
                }
            }, 1900);
            for (let i = 0; i < 4; i++) setTimeout(() => spawnDieWord(), i * 350);
        }
        
        // draw all "DIE" words with slight wobble
        function drawDieWords() {
            for (let w of dieWords) {
                ctx.save();
                ctx.font = `900 ${w.size}px "Comic Sans MS", "Courier New", monospace`;
                ctx.shadowBlur = 3;
                ctx.shadowColor = "#ff77aa";
                let offsetX = 0, offsetY = 0;
                if (hasPerformedAction) {
                    offsetX = (Math.sin(Date.now() * 0.024 + w.wiggleSeed) * 4);
                    offsetY = (Math.cos(Date.now() * 0.027 + w.wiggleSeed) * 3);
                } else {
                    offsetX = Math.sin(Date.now() * 0.01 + w.wiggleSeed) * 1.8;
                    offsetY = Math.cos(Date.now() * 0.012 + w.wiggleSeed) * 1.5;
                }
                ctx.fillStyle = w.color;
                ctx.fillText("DIE", w.x + offsetX, w.y + offsetY);
                // extra small glitch mark for weirdness
                if (w.color === "#e34234") {
                    ctx.font = `${w.size-10}px monospace`;
                    ctx.fillStyle = "#ff7777";
                    ctx.fillText("/", w.x + w.size*0.5, w.y - 6);
                } else {
                    ctx.fillStyle = "#888888";
                    ctx.font = `${w.size-8}px monospace`;
                    ctx.fillText("x", w.x - 10, w.y - 4);
                }
                ctx.restore();
            }
        }
        
        // draw the weird guy with gun to head + SUICIDE words around body
        function drawWeirdCharacter() {
            const isDead = hasPerformedAction;
            const headX = 400, headY = 170;
            const bodyX = 400;
            
            headBob = (Date.now() * 0.009) % (Math.PI * 2);
            const bobOffset = isDead ? 2 : Math.sin(headBob) * 2;
            
            // draw SUICIDE word "around the body or the guy" in multiple places
            ctx.save();
            ctx.font = `bold ${isDead ? 22 : 19}px "Papyrus", "Courier New"`;
            ctx.shadowBlur = 0;
            
            // rotating SUICIDE ring around torso
            suicideRotationAngle += 0.02;
            if (isDead) suicideRotationAngle += 0.09;
            const angle = suicideRotationAngle;
            const radius = 74;
            const centerX = bodyX + 8, centerY = headY + 72;
            const wordX = centerX + Math.cos(angle) * radius;
            const wordY = centerY + Math.sin(angle) * radius * 0.75;
            ctx.fillStyle = isDead ? "#ff88aa" : "#c44c77";
            ctx.fillText("SUICIDE", wordX - 45, wordY);
            
            // more "SUICIDE" wrapping the body
            ctx.font = "18px 'Comic Sans MS'";
            ctx.fillStyle = "#c7557a";
            ctx.fillText("SUICIDE", bodyX - 85, headY + 35);
            ctx.fillStyle = "#dc7f9e";
            ctx.fillText("SUICIDE", bodyX + 55, headY + 115);
            ctx.font = "italic 20px fantasy";
            ctx.fillStyle = "#aa4f6e";
            ctx.fillText("SUICIDE", bodyX - 25, headY + 175);
            if (!isDead) {
                ctx.font = "bold 14px monospace";
                ctx.fillStyle = "#ee99aa";
                ctx.fillText("(suicide ballet)", bodyX + 20, headY + 205);
            } else {
                ctx.fillStyle = "#ff88bb";
                ctx.font = "bold 24px 'Comic Sans'";
                ctx.fillText("SUICIDE (finale)", bodyX - 70, headY + 245);
            }
            
            // BODY: rubber hose / silly proportions
            ctx.fillStyle = "#6b4e3a";
            ctx.fillRect(bodyX-32, headY+80, 64, 108);
            ctx.fillStyle = "#4d3527";
            ctx.fillRect(bodyX-26, headY+184, 22, 62);
            ctx.fillRect(bodyX+4, headY+184, 22, 62);
            
            // neck
            ctx.fillStyle = "#c79a6e";
            ctx.fillRect(headX-16, headY+24, 32, 20);
            
            // HEAD (oval weird)
            ctx.beginPath();
            ctx.ellipse(headX, headY + bobOffset*0.4, 34, 38, 0, 0, Math.PI*2);
            ctx.fillStyle = "#f7cf9f";
            ctx.fill();
            ctx.strokeStyle = "#8b5a2b";
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // eyes: googly but weird
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.ellipse(headX-16, headY-4, 9, 13, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(headX+16, headY-4, 9, 13, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#010101";
            ctx.beginPath();
            ctx.arc(headX-16 + (Math.sin(Date.now()*0.02)*2.5), headY-2, 4.5, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(headX+16 + (Math.cos(Date.now()*0.023)*2.5), headY-2, 4.5, 0, Math.PI*2);
            ctx.fill();
            
            // big goofy grin
            ctx.beginPath();
            ctx.arc(headX, headY+14, 20, 0.05, Math.PI - 0.05);
            ctx.strokeStyle = "#672100";
            ctx.lineWidth = 3;
            ctx.stroke();
            if(!isDead){
                ctx.fillStyle = "#ff6b6b";
                ctx.beginPath();
                ctx.ellipse(headX+6, headY+24, 7, 5, 0, 0, Math.PI*2);
                ctx.fill();
            } else {
                // x_x deadpan funny
                ctx.fillStyle = "#2f1e0c";
                ctx.font = "28px monospace";
                ctx.fillText("X", headX-24, headY+2);
                ctx.fillText("X", headX+12, headY+2);
            }
            
            // RIGHT ARM + GUN pointing at head (the 'gun to head' feature)
            if(!isDead){
                // noodle arm
                ctx.beginPath();
                ctx.moveTo(bodyX+34, headY+58);
                ctx.quadraticCurveTo(bodyX+68, headY+32, bodyX+58, headY+2);
                ctx.lineTo(bodyX+46, headY-2);
                ctx.fillStyle = "#c28754";
                ctx.fill();
                // weird gun: distorted colorful shape
                ctx.fillStyle = "#44aa77";
                ctx.fillRect(bodyX+50, headY-8, 30, 14);
                ctx.fillStyle = "#2e8b57";
                ctx.fillRect(bodyX+72, headY-6, 18, 10);
                ctx.fillStyle = "hotpink";
                ctx.beginPath();
                ctx.rect(bodyX+84, headY-12, 12, 20);
                ctx.fill();
                ctx.fillStyle = "#ffaa66";
                ctx.font = "bold 11px monospace";
                ctx.fillText("click", bodyX+68, headY-14);
                // trigger finger
                ctx.beginPath();
                ctx.arc(bodyX+50, headY+0, 5.5, 0, Math.PI*2);
                ctx.fillStyle = "#eeaa77";
                ctx.fill();
            } else {
                // after self-shot: absurd confetti explosion + silly effects
                ctx.fillStyle = "#ffaa66";
                ctx.font = "bold 26px 'Comic Sans'";
                ctx.fillText("BOINK CRACKLE", bodyX-50, headY+125);
                ctx.fillStyle = "#ff44aa";
                for(let i=0;i<22;i++){
                    ctx.beginPath();
                    ctx.arc(bodyX-25 + Math.random()*90, headY+35 + Math.random()*110, Math.random()*5+2, 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.fillStyle = "#ffdd88";
                ctx.font = "32px monospace";
                ctx.fillText("~", bodyX-20, headY+80);
                ctx.fillText("*", bodyX+35, headY+110);
                // fallen gun on ground
                ctx.fillStyle = "teal";
                ctx.fillRect(bodyX+48, headY+155, 34, 12);
                ctx.fillStyle = "cyan";
                ctx.fillRect(bodyX+70, headY+149, 12, 18);
            }
            
            // left arm: waving absurdly
            ctx.beginPath();
            ctx.moveTo(bodyX-34, headY+63);
            ctx.lineTo(bodyX-70, headY+85);
            ctx.lineTo(bodyX-48, headY+100);
            ctx.fillStyle = "#b57a48";
            ctx.fill();
            if(!isDead){
                ctx.fillStyle = "#ffaaaa";
                ctx.font = "14px comic sans";
                ctx.fillText("wave", bodyX-78, headY+80);
            }
            ctx.restore();
        }
        
        // draw glitchy weird background patterns
        function drawWeirdBackground() {
            ctx.fillStyle = "#f7e9cf";
            ctx.fillRect(0,0,W,H);
            // squiggly lines
            for(let i=0;i<40;i++){
                ctx.beginPath();
                ctx.moveTo(i*30, H-40);
                ctx.lineTo(i*30+15, H-55 + Math.sin(Date.now()*0.003 + i)*12);
                ctx.lineTo(i*30-10, H-70);
                ctx.fillStyle = `rgba(200, 150, 200, 0.2)`;
                ctx.fill();
            }
            ctx.fillStyle = "#ffcb8a";
            ctx.font = "bold 22px 'Papyrus'";
            ctx.fillText("WEIRD THEATRE", 25, 50);
            ctx.font = "10px monospace";
            ctx.fillStyle = "#b3776e";
            ctx.fillText("no refunds for absurd endings", W-200, H-12);
        }
        
        // THE BUTTON ACTION: "i dont care" -> person will 'shoot himself' in weird funny way
        function performAbsurdSelfShot() {
            if (hasPerformedAction) return;
            hasPerformedAction = true;
            meltdownTimer = 25;
            
            // stop spawning new DIE words
            if (spawnInterval) clearInterval(spawnInterval);
            spawnInterval = null;
            
            // make existing die words more chaotic
            for(let i=0;i<dieWords.length;i++){
                dieWords[i].wiggleSeed = Math.random() * 20;
            }
            
            // button effect
            const btn = document.getElementById("sillyTriggerBtn");
            btn.innerText = "FATALITY (funny)";
            btn.disabled = true;
            btn.style.opacity = "0.7";
            btn.style.filter = "grayscale(0.3)";
            
            const msgDiv = document.getElementById("weirdMessage");
            msgDiv.innerHTML = "!!! THE WEIRD SHOT !!!";
            
            // small screen shake
            let shakeCount = 0;
            const shakeInt = setInterval(()=>{
                if(shakeCount >= 4) clearInterval(shakeInt);
                else {
                    canvas.style.transform = `translate(${Math.random()*6-3}px, ${Math.random()*4-2}px)`;
                    setTimeout(()=>{ canvas.style.transform = ""; }, 80);
                    shakeCount++;
                }
            }, 100);
        }
        
        // manage die words lifetime (auto remove old)
        function manageDieWords() {
            const now = Date.now();
            for(let i=dieWords.length-1; i>=0; i--) {
                if(now - dieWords[i].createdAt > 22000) {
                    dieWords.splice(i,1);
                }
            }
            if(dieWords.length < 3 && !hasPerformedAction && spawnInterval) {
                for(let i=0;i<2;i++) spawnDieWord();
            }
        }
        
        // ----- MAIN ANIMATION LOOP -----
        function animate() {
            if(!hasPerformedAction) {
                manageDieWords();
                if(dieWords.length < 2 && Math.random()<0.02 && spawnInterval) spawnDieWord();
            }
            
            drawWeirdBackground();
            drawDieWords();
            drawWeirdCharacter();
            
            // extra floating SUICIDE words that orbit around (reinforcing requirement)
            ctx.save();
            ctx.font = "bold 18px 'Courier New'";
            ctx.fillStyle = hasPerformedAction ? "#ff9977" : "#bd6d8f";
            const time = Date.now() * 0.005;
            const orbitX = 400 + Math.sin(time)*55;
            const orbitY = 220 + Math.cos(time*1.3)*35;
            ctx.fillText("SUICIDE", orbitX-40, orbitY);
            ctx.font = "italic 14px monospace";
            ctx.fillStyle = "#aa5577";
            ctx.fillText("(around body)", 325, 280);
            ctx.restore();
            
            if(meltdownTimer > 0) {
                meltdownTimer--;
                // flashing effect on canvas border
                ctx.strokeStyle = `rgba(255, 100, 150, ${Math.sin(Date.now()*0.03)*0.6+0.3})`;
                ctx.lineWidth = 8;
                ctx.strokeRect(5, 5, W-10, H-10);
            }
            
            requestAnimationFrame(animate);
        }
        
        // initialize everything
        function init() {
            startDieSpawning();
            // attach button event
            const actionBtn = document.getElementById("sillyTriggerBtn");
            actionBtn.addEventListener("click", (e) => {
                e.preventDefault();
                performAbsurdSelfShot();
            });
            animate();
        }
        
        init();
    })();
</script>
</body>
</html>

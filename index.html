<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Heart of Words · Eternal Love</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: radial-gradient(circle at center, #0a0508 0%, #000000 100%);
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', 'Poppins', 'Arial', system-ui, sans-serif;
    }

    .container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* each "I love you" word - forms the heart shape */
    .word-particle {
      position: absolute;
      color: #c41e1e;
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
      pointer-events: none;
      text-shadow: 0 0 4px #8b0000, 0 0 10px #5e0000;
      opacity: 0;
      z-index: 15;
      will-change: transform;
      font-weight: 600;
      letter-spacing: 0.3px;
      animation: gentleAppear 0.45s ease forwards;
    }

    /* subtle floating pulse for each word - makes heart feel alive */
    @keyframes gentleAppear {
      0% {
        opacity: 0;
        transform: scale(0.6);
        filter: blur(4px);
      }
      100% {
        opacity: 1;
        transform: scale(1);
        filter: blur(0);
      }
    }

    /* floating heartbeat animation for all words */
    .word-particle {
      animation: gentleAppear 0.45s ease forwards, softFloat 3s ease-in-out infinite;
    }

    @keyframes softFloat {
      0% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-3px);
      }
      100% {
        transform: translateY(0px);
      }
    }

    /* glowing letter E in the center of the heart */
    .center-letter {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 95px;
      font-weight: 900;
      font-family: 'Segoe UI', 'Arial Black', 'Impact', sans-serif;
      opacity: 1;
      z-index: 30;
      text-shadow: 0 0 20px #a81c1c, 0 0 35px #6d0e0e, 0 0 55px #3a0303, 0 0 80px #8b0000;
      color: #d42a2a;
      letter-spacing: 8px;
      pointer-events: none;
      white-space: pre;
      background: none;
      animation: eGlowPulse 2s ease-in-out infinite alternate;
    }

    @keyframes eGlowPulse {
      0% {
        text-shadow: 0 0 20px #a81c1c, 0 0 35px #6d0e0e, 0 0 55px #3a0303;
        transform: translate(-50%, -50%) scale(0.98);
      }
      100% {
        text-shadow: 0 0 35px #ff5555, 0 0 60px #c12727, 0 0 90px #8b0000, 0 0 120px #a11a1a;
        transform: translate(-50%, -50%) scale(1.02);
      }
    }

    /* responsive adjustments */
    @media (max-width: 700px) {
      .word-particle {
        font-size: 10px;
      }
      .center-letter {
        font-size: 65px;
        letter-spacing: 5px;
      }
    }

    @media (max-width: 480px) {
      .word-particle {
        font-size: 8px;
      }
      .center-letter {
        font-size: 50px;
        letter-spacing: 3px;
      }
    }
  </style>
</head>
<body>
<div class="container" id="container">
  <div class="center-letter" id="heartLetterE">E</div>
</div>

<script>
  (function() {
    const container = document.getElementById('container');
    const centerE = document.getElementById('heartLetterE');
    
    // ==================== PERFECT HEART SHAPE EQUATION ====================
    // Classic parametric heart: x = 16sin³(t), y = 13cos(t) - 5cos(2t) - 2cos(3t) - cos(4t)
    const heartPoints = [];
    
    // Generate points with perfect density for beautiful heart silhouette
    for (let t = 0; t < Math.PI * 2; t += 0.052) {
      const x = 16 * Math.pow(Math.sin(t), 3);
      const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
      heartPoints.push({ x, y });
    }
    
    // Sort bottom to top for elegant draw effect (visual layering)
    heartPoints.sort((a, b) => a.y - b.y);
    const totalWords = heartPoints.length;
    
    // Heart scaling factor (size on screen)
    let heartScale = 24;
    let centerX = window.innerWidth / 2;
    let centerY = window.innerHeight / 2;
    
    // Store all word elements
    let wordElements = [];
    
    // ==================== CREATE WORDS ON HEART SHAPE ====================
    function createWordsOnHeart() {
      heartPoints.forEach((point, idx) => {
        const word = document.createElement('div');
        word.className = 'word-particle';
        word.innerText = 'I love you';
        
        // Dark rich red with subtle variation
        const redValue = 180 + Math.floor(Math.random() * 40);
        word.style.color = `rgb(${redValue}, 35, 35)`;
        
        // Calculate position based on heart equation
        const leftPos = centerX + point.x * heartScale;
        const topPos = centerY - point.y * heartScale;
        
        word.style.left = `${leftPos}px`;
        word.style.top = `${topPos}px`;
        
        // Staggered appearance animation delay
        word.style.animationDelay = `${idx * 0.018}s`;
        
        // Custom float delay to make heart feel organic
        const floatDelay = (idx % 7) * 0.4;
        word.style.animation = `gentleAppear 0.45s ease forwards, softFloat 2.8s ease-in-out infinite ${floatDelay}s`;
        
        container.appendChild(word);
        wordElements.push(word);
      });
    }
    
    // ==================== RESPONSIVE REPOSITIONING ====================
    // Keep heart perfectly centered and shaped on window resize
    function repositionHeart() {
      centerX = window.innerWidth / 2;
      centerY = window.innerHeight / 2;
      
      wordElements.forEach((word, idx) => {
        if (!word.parentNode) return;
        const point = heartPoints[idx];
        if (!point) return;
        
        const newLeft = centerX + point.x * heartScale;
        const newTop = centerY - point.y * heartScale;
        
        word.style.left = `${newLeft}px`;
        word.style.top = `${newTop}px`;
      });
      
      // Keep E perfectly centered
      centerE.style.left = '50%';
      centerE.style.top = '50%';
      centerE.style.transform = 'translate(-50%, -50%)';
    }
    
    // ==================== ADD EXTRA SPARKLE TO HEART (optional visual flair) ====================
    // Creates tiny shimmering dots around heart for magical feel
    function addHeartSparkles() {
      const sparkleColors = ['#ff4444', '#ff6666', '#cc3333', '#ff7777'];
      for (let i = 0; i < 60; i++) {
        const sparkle = document.createElement('div');
        sparkle.style.position = 'absolute';
        sparkle.style.width = '2px';
        sparkle.style.height = '2px';
        sparkle.style.backgroundColor = sparkleColors[Math.floor(Math.random() * sparkleColors.length)];
        sparkle.style.borderRadius = '50%';
        sparkle.style.pointerEvents = 'none';
        sparkle.style.opacity = '0';
        sparkle.style.zIndex = '8';
        
        // Random position around heart area
        const angle = Math.random() * Math.PI * 2;
        const radius = 150 + Math.random() * 80;
        const offsetX = Math.cos(angle) * radius;
        const offsetY = Math.sin(angle) * radius * 0.8; // slightly elliptical
        
        sparkle.style.left = `calc(50% + ${offsetX}px)`;
        sparkle.style.top = `calc(50% + ${offsetY}px)`;
        
        sparkle.style.animation = `sparkleFade ${1 + Math.random() * 2}s ease-in-out infinite ${Math.random() * 2}s`;
        container.appendChild(sparkle);
      }
      
      // Add sparkle animation style if not exists
      if (!document.querySelector('#sparkleStyle')) {
        const style = document.createElement('style');
        style.id = 'sparkleStyle';
        style.textContent = `
          @keyframes sparkleFade {
            0% { opacity: 0; transform: scale(0); }
            50% { opacity: 0.8; transform: scale(1.5); }
            100% { opacity: 0; transform: scale(0); }
          }
        `;
        document.head.appendChild(style);
      }
    }
    
    // ==================== INITIALIZE ====================
    createWordsOnHeart();
    
    // Add subtle sparkles around heart (optional beauty)
    setTimeout(() => {
      addHeartSparkles();
    }, 500);
    
    // Reposition on window resize for perfect responsiveness
    window.addEventListener('resize', () => {
      repositionHeart();
    });
    
    // Small delay to ensure all fonts and positions are calculated
    setTimeout(() => {
      repositionHeart();
    }, 100);
    
    // Log success
    console.log(`❤️ Beautiful heart created with ${totalWords} "I love you" words. Central E glowing in the middle.`);
  })();
</script>
</body>
</html>

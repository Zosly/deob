<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Requiem</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #000000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            background: #0a0a0c;
            cursor: crosshair;
        }

        /* Minimal button - black, sharp edges */
        .trigger-wrapper {
            position: fixed;
            bottom: 32px;
            right: 32px;
            z-index: 20;
            opacity: 0.85;
            transition: opacity 0.2s;
        }
        .trigger-wrapper:hover {
            opacity: 1;
        }

        .black-button {
            background: #000000;
            border: 1.5px solid #2c2c2c;
            color: #cccccc;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            font-weight: 600;
            padding: 12px 28px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.15s ease;
            text-transform: uppercase;
            box-shadow: none;
            border-radius: 0px;
        }

        .black-button:hover {
            background: #111111;
            border-color: #6a1a1a;
            color: #e0e0e0;
        }

        .black-button:active {
            transform: scale(0.97);
        }

        @media (max-width: 640px) {
            .trigger-wrapper {
                bottom: 20px;
                right: 20px;
            }
            .black-button {
                padding: 8px 20px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <canvas id="brutalCanvas"></canvas>
    <div class="trigger-wrapper">
        <button id="carelessBtn" class="black-button">i don't care</button>
    </div>

    <script>
        (function() {
            // ---------- FULLSCREEN CANVAS ----------
            const canvas = document.getElementById('brutalCanvas');
            const ctx = canvas.getContext('2d');
            
            let width, height;
            
            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }
            window.addEventListener('resize', () => {
                resizeCanvas();
                updateCharacterPositions();
            });
            resizeCanvas();
            
            // ---------- AUDIO: Gunshot (Web Audio API - realistic) ----------
            let audioContext = null;
            let gunshotBuffer = null;
            
            function initAudio() {
                try {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const sampleRate = audioContext.sampleRate;
                    const duration = 1.2;
                    const bufferSize = sampleRate * duration;
                    const buffer = audioContext.createBuffer(1, bufferSize, sampleRate);
                    const data = buffer.getChannelData(0);
                    
                    for (let i = 0; i < bufferSize; i++) {
                        let t = i / sampleRate;
                        let envelope = 0;
                        if (t < 0.008) envelope = t / 0.008;
                        else envelope = Math.exp(- (t - 0.008) * 38);
                        
                        let noise = (Math.random() * 2 - 1) * 0.75;
                        let crack = 0;
                        if (t < 0.01) crack = Math.sin(3.14159 * t / 0.01) * 0.85;
                        let thump = Math.sin(2 * Math.PI * 75 * t) * Math.exp(-t * 28) * 0.55;
                        let value = (noise * 0.75 + crack * 0.9 + thump) * envelope;
                        data[i] = Math.max(-0.9, Math.min(0.9, value));
                    }
                    gunshotBuffer = buffer;
                } catch(e) { console.warn("audio not supported"); }
            }
            
            function playGunshot() {
                if (!audioContext || !gunshotBuffer) {
                    if (!audioContext) initAudio();
                    if (!gunshotBuffer) return;
                }
                if (audioContext.state === 'suspended') {
                    audioContext.resume().then(() => {
                        const source = audioContext.createBufferSource();
                        source.buffer = gunshotBuffer;
                        source.connect(audioContext.destination);
                        source.start();
                    }).catch(e=>console.warn);
                } else {
                    const source = audioContext.createBufferSource();
                    source.buffer = gunshotBuffer;
                    source.connect(audioContext.destination);
                    source.start();
                }
            }
            
            // ---------- STATE ----------
            let hasActed = false;           
            let actingPhase = 0;            // 0 = idle, 1 = bleeding active, 2 = fade out
            let shakeIntensity = 0;
            let blurAmount = 0;
            let fadeOpacity = 0;
            
            // Dynamic blood system: blood pool that grows over time
            let bloodPool = {
                active: false,
                radius: 0,           // current spread radius
                maxRadius: 0,
                centerX: 0,
                centerY: 0,
                growthRate: 0.8,     // pixels per frame
                bloodDrops: []       // additional splatter drops
            };
            
            let ragdollAngle = 0;
            let bleedTimer = 0;       // time since shot (frames)
            const BLEED_DURATION = 180; // frames until full coverage and fade out (~3 sec at 60fps)
            
            // ---------- CHARACTER: realistic human proportions, arms connected, tall body ----------
            let character = {
                headX: 0, headY: 0,
                neckX: 0, neckY: 0,
                bodyX: 0, bodyY: 0,
                leftShoulderX: 0, leftShoulderY: 0,
                leftElbowX: 0, leftElbowY: 0,
                leftHandX: 0, leftHandY: 0,
                rightShoulderX: 0, rightShoulderY: 0,
                rightElbowX: 0, rightElbowY: 0,
                rightHandX: 0, rightHandY: 0,
                gunX: 0, gunY: 0,
                gunAngle: 0
            };
            
            function updateCharacterPositions() {
                const headCenterX = width * 0.5;
                const headCenterY = height * 0.38;
                
                character.headX = headCenterX;
                character.headY = headCenterY;
                character.neckX = headCenterX;
                character.neckY = headCenterY + 32;
                character.bodyX = headCenterX;
                character.bodyY = character.neckY + 8;
                
                character.leftShoulderX = character.bodyX - 42;
                character.leftShoulderY = character.bodyY - 4;
                character.rightShoulderX = character.bodyX + 42;
                character.rightShoulderY = character.bodyY - 4;
                
                character.leftElbowX = character.leftShoulderX - 28;
                character.leftElbowY = character.leftShoulderY + 52;
                character.leftHandX = character.leftElbowX - 12;
                character.leftHandY = character.leftElbowY + 48;
                
                character.rightElbowX = character.rightShoulderX + 18;
                character.rightElbowY = character.rightShoulderY + 28;
                character.rightHandX = character.headX + 38;
                character.rightHandY = character.headY - 2;
                
                character.gunX = character.rightHandX + 8;
                character.gunY = character.rightHandY + 2;
                character.gunAngle = -0.18;
            }
            
            // ---------- DYNAMIC BLOOD SYSTEM ----------
            function startBleeding() {
                bloodPool.active = true;
                bloodPool.radius = 8;
                // Max radius: enough to cover large floor area around the body
                bloodPool.maxRadius = Math.min(width, height) * 0.65;
                bloodPool.centerX = character.bodyX;
                bloodPool.centerY = character.bodyY + 85;
                
                // Initial blood drops from head wound (realistic spray)
                for(let i=0; i<35; i++) {
                    const angle = (Math.random() - 0.5) * Math.PI * 1.4;
                    const dist = Math.random() * 55;
                    bloodPool.bloodDrops.push({
                        x: character.headX + Math.cos(angle) * dist * 0.9,
                        y: character.headY + 15 + Math.sin(angle) * dist * 0.7,
                        radius: Math.random() * 6 + 2.5,
                        alpha: 0.95
                    });
                }
            }
            
            function updateBloodSpread() {
                if (!bloodPool.active) return;
                
                bleedTimer++;
                
                // Grow blood pool radius over time (accelerating slightly)
                if (bloodPool.radius < bloodPool.maxRadius) {
                    let growth = bloodPool.growthRate;
                    // accelerate as blood flows
                    if (bleedTimer > 40) growth *= 1.3;
                    if (bleedTimer > 90) growth *= 1.5;
                    bloodPool.radius += growth;
                    if (bloodPool.radius > bloodPool.maxRadius) bloodPool.radius = bloodPool.maxRadius;
                }
                
                // Add new blood drops periodically from head wound (continuing bleed)
                if (bleedTimer % 6 === 0 && bleedTimer < BLEED_DURATION - 30) {
                    for(let i=0; i<3; i++) {
                        const angle = (Math.random() - 0.5) * Math.PI * 1.2;
                        const dist = Math.random() * 45;
                        bloodPool.bloodDrops.push({
                            x: character.headX + Math.cos(angle) * dist * 0.8,
                            y: character.headY + 12 + Math.sin(angle) * dist * 0.6 + Math.random() * 15,
                            radius: Math.random() * 5 + 2,
                            alpha: 0.92
                        });
                    }
                }
                
                // Also add some drip drops that slide down the body
                if (bleedTimer % 8 === 0 && bleedTimer < BLEED_DURATION - 20) {
                    bloodPool.bloodDrops.push({
                        x: character.bodyX + (Math.random() - 0.5) * 40,
                        y: character.bodyY + 50 + Math.random() * 80,
                        radius: Math.random() * 5 + 2,
                        alpha: 0.9
                    });
                }
                
                // Limit blood drops array size
                if (bloodPool.bloodDrops.length > 400) {
                    bloodPool.bloodDrops = bloodPool.bloodDrops.slice(-350);
                }
                
                // Transition to fade out when blood pool is nearly full
                if (bleedTimer >= BLEED_DURATION && actingPhase === 1) {
                    actingPhase = 2;  // start fade out
                    fadeOpacity = 0;
                }
            }
            
            function drawBloodPool() {
                if (!bloodPool.active) return;
                
                // Draw main spreading blood pool (radial gradient for realistic spread)
                const gradient = ctx.createRadialGradient(
                    bloodPool.centerX, bloodPool.centerY, 5,
                    bloodPool.centerX, bloodPool.centerY, bloodPool.radius
                );
                gradient.addColorStop(0, "rgba(85, 12, 12, 0.95)");
                gradient.addColorStop(0.4, "rgba(75, 10, 10, 0.85)");
                gradient.addColorStop(0.7, "rgba(60, 8, 8, 0.7)");
                gradient.addColorStop(1, "rgba(45, 5, 5, 0.4)");
                
                ctx.beginPath();
                ctx.ellipse(bloodPool.centerX, bloodPool.centerY, bloodPool.radius, bloodPool.radius * 0.65, 0, 0, Math.PI*2);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                // Draw secondary pool spreading toward edges
                if (bloodPool.radius > 80) {
                    const secondGrad = ctx.createRadialGradient(
                        bloodPool.centerX - 20, bloodPool.centerY + 15, 10,
                        bloodPool.centerX - 20, bloodPool.centerY + 15, bloodPool.radius * 0.7
                    );
                    secondGrad.addColorStop(0, "rgba(70, 10, 10, 0.7)");
                    secondGrad.addColorStop(1, "rgba(40, 5, 5, 0.3)");
                    ctx.beginPath();
                    ctx.ellipse(bloodPool.centerX - 25, bloodPool.centerY + 20, bloodPool.radius * 0.55, bloodPool.radius * 0.4, 0, 0, Math.PI*2);
                    ctx.fillStyle = secondGrad;
                    ctx.fill();
                }
                
                // Draw individual blood drops/splatters
                for(let drop of bloodPool.bloodDrops) {
                    ctx.beginPath();
                    ctx.ellipse(drop.x, drop.y, drop.radius, drop.radius * 0.7, 0, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(95, 12, 12, ${drop.alpha * 0.9})`;
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(drop.x - 1, drop.y - 0.5, drop.radius * 0.45, drop.radius * 0.35, 0, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(55, 5, 5, 0.85)`;
                    ctx.fill();
                }
            }
            
            // ---------- DRAW REALISTIC GUN ----------
            function drawRealisticGun(x, y, angle, isFallen = false) {
                ctx.save();
                ctx.translate(x, y);
                if(angle) ctx.rotate(angle);
                ctx.fillStyle = "#232323";
                ctx.shadowBlur = 1.5;
                ctx.fillRect(-24, -7, 48, 15);
                ctx.fillStyle = "#3a3a3a";
                ctx.fillRect(-20, -9, 38, 4);
                ctx.fillStyle = "#181818";
                ctx.fillRect(20, -5, 18, 9);
                ctx.beginPath();
                ctx.moveTo(-24, -3);
                ctx.lineTo(-32, 14);
                ctx.lineTo(-16, 14);
                ctx.fill();
                ctx.fillStyle = "#2e2a24";
                ctx.fillRect(-30, 5, 16, 9);
                ctx.beginPath();
                ctx.arc(-14, 0, 5.5, 0, Math.PI * 1.85);
                ctx.strokeStyle = "#444";
                ctx.lineWidth = 1.8;
                ctx.stroke();
                ctx.fillStyle = "#555";
                ctx.fillRect(-16, -1, 2, 5);
                ctx.fillStyle = "#2a2a2a";
                ctx.fillRect(6, -10, 7, 6);
                ctx.restore();
            }
            
            // ---------- DRAW HUMAN FIGURE (featureless black, tall, arms connected) ----------
            function drawHumanFigure() {
                const hX = character.headX;
                const hY = character.headY;
                const nX = character.neckX;
                const nY = character.neckY;
                const bX = character.bodyX;
                const bY = character.bodyY;
                const isDead = hasActed;
                
                ctx.save();
                if(isDead && ragdollAngle !== 0) {
                    ctx.translate(bX, bY + 15);
                    ctx.rotate(ragdollAngle * 0.55);
                    ctx.translate(-bX, -(bY + 15));
                }
                
                // TORSO
                ctx.fillStyle = "#000000";
                ctx.fillRect(bX-38, bY-4, 76, 138);
                ctx.fillRect(bX-32, bY+128, 64, 32);
                
                // LEGS
                ctx.fillRect(bX-32, bY+148, 26, 78);
                ctx.fillRect(bX+6, bY+148, 26, 78);
                
                // NECK
                ctx.fillRect(nX-14, nY-4, 28, 24);
                
                // HEAD (round, black)
                ctx.beginPath();
                ctx.arc(hX, hY, 36, 0, Math.PI*2);
                ctx.fillStyle = "#000000";
                ctx.fill();
                ctx.strokeStyle = "#1e1e1e";
                ctx.lineWidth = 1.2;
                ctx.stroke();
                
                // WOUND VISUAL (after shot - small dark hole with blood around)
                if(isDead && bleedTimer > 0) {
                    ctx.beginPath();
                    ctx.arc(hX + 6, hY - 4, 8, 0, Math.PI*2);
                    ctx.fillStyle = "#2a0505";
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(hX + 4, hY - 6, 4, 0, Math.PI*2);
                    ctx.fillStyle = "#4a0808";
                    ctx.fill();
                }
                
                // LEFT ARM
                ctx.beginPath();
                ctx.moveTo(character.leftShoulderX, character.leftShoulderY);
                ctx.lineTo(character.leftElbowX, character.leftElbowY);
                ctx.lineTo(character.leftElbowX + 12, character.leftElbowY + 8);
                ctx.lineTo(character.leftShoulderX + 8, character.leftShoulderY + 6);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(character.leftElbowX, character.leftElbowY);
                ctx.lineTo(character.leftHandX, character.leftHandY);
                ctx.lineTo(character.leftHandX + 12, character.leftHandY + 6);
                ctx.lineTo(character.leftElbowX + 12, character.leftElbowY + 8);
                ctx.fill();
                
                // RIGHT ARM
                ctx.beginPath();
                ctx.moveTo(character.rightShoulderX, character.rightShoulderY);
                ctx.lineTo(character.rightElbowX, character.rightElbowY);
                ctx.lineTo(character.rightElbowX - 10, character.rightElbowY + 8);
                ctx.lineTo(character.rightShoulderX - 6, character.rightShoulderY + 6);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(character.rightElbowX, character.rightElbowY);
                ctx.lineTo(character.rightHandX, character.rightHandY);
                ctx.lineTo(character.rightHandX - 8, character.rightHandY + 6);
                ctx.lineTo(character.rightElbowX - 10, character.rightElbowY + 8);
                ctx.fill();
                
                if(!isDead) {
                    drawRealisticGun(character.gunX, character.gunY, character.gunAngle, false);
                } else {
                    drawRealisticGun(bX+44, bY+158, 1.3, true);
                }
                
                ctx.restore();
            }
            
            // ---------- SHOOT SEQUENCE ----------
            function startShootSequence() {
                if(hasActed) return;
                hasActed = true;
                actingPhase = 1;      // bleeding phase
                shakeIntensity = 20;
                blurAmount = 14;
                bleedTimer = 0;
                
                playGunshot();
                
                // Start the dynamic blood spread (not instant pool)
                startBleeding();
                
                // Initial head wound blood spray (few drops)
                for(let i=0;i<25;i++) {
                    const angle = (Math.random() - 0.5) * Math.PI * 1.2;
                    const dist = Math.random() * 40;
                    bloodPool.bloodDrops.push({
                        x: character.headX + Math.cos(angle) * dist,
                        y: character.headY + 10 + Math.sin(angle) * dist * 0.7,
                        radius: Math.random() * 5 + 2,
                        alpha: 0.95
                    });
                }
                
                // Ragdoll effect
                ragdollAngle = -0.42;
                
                // Disable button
                const btn = document.getElementById('carelessBtn');
                if(btn) {
                    btn.disabled = true;
                    btn.style.opacity = "0.35";
                    btn.style.cursor = "default";
                    btn.innerText = "---";
                }
            }
            
            // ---------- POST PROCESSING ----------
            function updatePostProcessing() {
                if(actingPhase === 1) {
                    // Shake and blur fade out over time
                    shakeIntensity *= 0.94;
                    blurAmount *= 0.94;
                    
                    // Update blood spread
                    updateBloodSpread();
                    
                    // Ragdoll settling
                    ragdollAngle += ( -0.49 - ragdollAngle ) * 0.09;
                    if(ragdollAngle < -0.49) ragdollAngle = -0.49;
                }
                else if(actingPhase === 2) {
                    fadeOpacity += 0.012;
                    if(fadeOpacity >= 1.0) {
                        fadeOpacity = 1.0;
                        actingPhase = 3;   // frozen black screen
                    }
                }
            }
            
            function applyShakeAndBlur() {
                if(actingPhase === 1 && (shakeIntensity > 0.8 || blurAmount > 0.5)) {
                    const dx = (Math.random() - 0.5) * shakeIntensity;
                    const dy = (Math.random() - 0.5) * shakeIntensity * 0.7;
                    canvas.style.transform = `translate(${dx}px, ${dy}px)`;
                    let blurValue = Math.min(blurAmount, 12);
                    if(blurValue > 0.4) {
                        canvas.style.filter = `blur(${blurValue}px)`;
                    } else {
                        canvas.style.filter = "none";
                    }
                } else {
                    canvas.style.transform = "";
                    if(actingPhase !== 1) canvas.style.filter = "";
                }
            }
            
            function drawFadeOverlay() {
                if(actingPhase >= 2 && fadeOpacity > 0) {
                    ctx.fillStyle = `rgba(0, 0, 0, ${Math.min(fadeOpacity, 0.99)})`;
                    ctx.fillRect(0, 0, width, height);
                }
            }
            
            // ---------- BACKGROUND ----------
            function drawBackground() {
                const grad = ctx.createLinearGradient(0, 0, 0, height);
                grad.addColorStop(0, "#08080c");
                grad.addColorStop(1, "#12141c");
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, width, height);
                
                ctx.fillStyle = "rgba(28,28,38,0.22)";
                for(let i=0;i<160;i++) {
                    ctx.fillRect((i*131)%width, (i*83)%height, 1.2, 1.2);
                }
                ctx.beginPath();
                ctx.moveTo(0, height*0.76);
                ctx.lineTo(width, height*0.73);
                ctx.strokeStyle = "#1c1818";
                ctx.lineWidth = 2.5;
                ctx.stroke();
            }
            
            // ---------- RENDER LOOP ----------
            let animationFrame;
            
            function render() {
                if (!ctx) return;
                if (width === 0 || height === 0) {
                    resizeCanvas();
                    updateCharacterPositions();
                }
                
                updateCharacterPositions();
                updatePostProcessing();
                
                drawBackground();
                drawBloodPool();      // dynamic spreading blood
                drawHumanFigure();
                
                // Additional blood dripping from head wound (active bleeding effect)
                if(hasActed && bloodPool.active && bleedTimer < BLEED_DURATION) {
                    ctx.beginPath();
                    ctx.ellipse(character.headX + 3, character.headY + 12, 5, 8, 0, 0, Math.PI*2);
                    ctx.fillStyle = "rgba(85, 12, 12, 0.85)";
                    ctx.fill();
                }
                
                drawFadeOverlay();
                applyShakeAndBlur();
                
                animationFrame = requestAnimationFrame(render);
            }
            
            // ---------- INITIALIZATION ----------
            function init() {
                resizeCanvas();
                updateCharacterPositions();
                initAudio();
                
                const btn = document.getElementById('carelessBtn');
                if(btn) {
                    btn.addEventListener('click', (e) => {
                        e.preventDefault();
                        if(!hasActed) {
                            if(audioContext && audioContext.state === 'suspended') {
                                audioContext.resume().then(() => startShootSequence()).catch(()=>startShootSequence());
                            } else {
                                startShootSequence();
                            }
                        }
                    });
                }
                
                render();
            }
            
            init();
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>at the end its all my fault</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #000000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            background: #0a0a0c;
            cursor: crosshair;
        }

        /* Minimal button - black, sharp edges */
        .trigger-wrapper {
            position: fixed;
            bottom: 32px;
            right: 32px;
            z-index: 20;
            opacity: 0.85;
            transition: opacity 0.2s;
        }
        .trigger-wrapper:hover {
            opacity: 1;
        }

        .black-button {
            background: #000000;
            border: 1.5px solid #2c2c2c;
            color: #cccccc;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            font-weight: 600;
            padding: 12px 28px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.15s ease;
            text-transform: uppercase;
            box-shadow: none;
            border-radius: 0px;
        }

        .black-button:hover {
            background: #111111;
            border-color: #6a1a1a;
            color: #e0e0e0;
        }

        .black-button:active {
            transform: scale(0.97);
        }

        @media (max-width: 640px) {
            .trigger-wrapper {
                bottom: 20px;
                right: 20px;
            }
            .black-button {
                padding: 8px 20px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <canvas id="brutalCanvas"></canvas>
    <div class="trigger-wrapper">
        <button id="carelessBtn" class="black-button">i don't care</button>
    </div>

    <script>
        (function() {
            // ---------- FULLSCREEN CANVAS ----------
            const canvas = document.getElementById('brutalCanvas');
            const ctx = canvas.getContext('2d');
            
            let width, height;
            
            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }
            window.addEventListener('resize', () => {
                resizeCanvas();
                updateCharacterPositions();
            });
            resizeCanvas();
            
            // ---------- AUDIO: Gunshot (Web Audio API - realistic) ----------
            let audioContext = null;
            let gunshotBuffer = null;
            
            function initAudio() {
                try {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    // Generate a realistic gunshot using noise and transients
                    const sampleRate = audioContext.sampleRate;
                    const duration = 1.2;
                    const bufferSize = sampleRate * duration;
                    const buffer = audioContext.createBuffer(1, bufferSize, sampleRate);
                    const data = buffer.getChannelData(0);
                    
                    for (let i = 0; i < bufferSize; i++) {
                        let t = i / sampleRate;
                        let envelope = 0;
                        if (t < 0.008) envelope = t / 0.008;
                        else envelope = Math.exp(- (t - 0.008) * 38);
                        
                        let noise = (Math.random() * 2 - 1) * 0.75;
                        let crack = 0;
                        if (t < 0.01) crack = Math.sin(3.14159 * t / 0.01) * 0.85;
                        let thump = Math.sin(2 * Math.PI * 75 * t) * Math.exp(-t * 28) * 0.55;
                        let value = (noise * 0.75 + crack * 0.9 + thump) * envelope;
                        data[i] = Math.max(-0.9, Math.min(0.9, value));
                    }
                    gunshotBuffer = buffer;
                } catch(e) { console.warn("audio not supported"); }
            }
            
            function playGunshot() {
                if (!audioContext || !gunshotBuffer) {
                    if (!audioContext) initAudio();
                    if (!gunshotBuffer) return;
                }
                if (audioContext.state === 'suspended') {
                    audioContext.resume().then(() => {
                        const source = audioContext.createBufferSource();
                        source.buffer = gunshotBuffer;
                        source.connect(audioContext.destination);
                        source.start();
                    }).catch(e=>console.warn);
                } else {
                    const source = audioContext.createBufferSource();
                    source.buffer = gunshotBuffer;
                    source.connect(audioContext.destination);
                    source.start();
                }
            }
            
            // ---------- STATE ----------
            let hasActed = false;           
            let actingPhase = 0;            // 0 = idle, 1 = shake/blur active, 2 = fade out
            let shakeIntensity = 0;
            let blurAmount = 0;
            let fadeOpacity = 0;
            let bloodParticles = [];
            let ragdollAngle = 0;
            
            // ---------- CHARACTER: realistic human proportions, arms connected, tall body ----------
            let character = {
                headX: 0, headY: 0,
                neckX: 0, neckY: 0,
                bodyX: 0, bodyY: 0,
                // arm joints (shoulder, elbow, hand)
                leftShoulderX: 0, leftShoulderY: 0,
                leftElbowX: 0, leftElbowY: 0,
                leftHandX: 0, leftHandY: 0,
                rightShoulderX: 0, rightShoulderY: 0,
                rightElbowX: 0, rightElbowY: 0,
                rightHandX: 0, rightHandY: 0,
                gunX: 0, gunY: 0,
                gunAngle: 0
            };
            
            function updateCharacterPositions() {
                const headCenterX = width * 0.5;
                const headCenterY = height * 0.38;     // head position
                
                character.headX = headCenterX;
                character.headY = headCenterY;
                character.neckX = headCenterX;
                character.neckY = headCenterY + 32;
                
                // body: tall, starts at neck, goes down
                character.bodyX = headCenterX;
                character.bodyY = character.neckY + 8;
                
                // Shoulders (broad enough)
                character.leftShoulderX = character.bodyX - 42;
                character.leftShoulderY = character.bodyY - 4;
                character.rightShoulderX = character.bodyX + 42;
                character.rightShoulderY = character.bodyY - 4;
                
                // LEFT ARM (natural hanging, tall, connected)
                character.leftElbowX = character.leftShoulderX - 28;
                character.leftElbowY = character.leftShoulderY + 52;
                character.leftHandX = character.leftElbowX - 12;
                character.leftHandY = character.leftElbowY + 48;
                
                // RIGHT ARM (bent upwards, holding gun to head - realistic human anatomy)
                character.rightElbowX = character.rightShoulderX + 18;
                character.rightElbowY = character.rightShoulderY + 28;
                character.rightHandX = character.headX + 38;
                character.rightHandY = character.headY - 2;
                
                // Gun position at hand/temple area
                character.gunX = character.rightHandX + 8;
                character.gunY = character.rightHandY + 2;
                character.gunAngle = -0.18;
            }
            
            // ---------- BLOOD SYSTEM (deep red realistic) ----------
            function addBloodSplatter(x, y, isIntense = true) {
                const count = isIntense ? 55 : 28;
                for(let i=0; i<count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const distance = Math.random() * (isIntense ? 85 : 55);
                    const offsetX = Math.cos(angle) * distance * (Math.random() * 0.7 + 0.3);
                    const offsetY = Math.sin(angle) * distance * 0.55 + Math.random() * 14;
                    bloodParticles.push({
                        x: x + offsetX,
                        y: y + offsetY + 5,
                        radius: Math.random() * 7 + 3.5,
                        alpha: 0.94,
                        life: 1.0
                    });
                }
                // heavy pool under head and torso
                for(let i=0;i<60;i++) {
                    bloodParticles.push({
                        x: x + (Math.random() - 0.5) * 120,
                        y: y + 32 + Math.random() * 55,
                        radius: Math.random() * 10 + 5,
                        alpha: 0.95,
                        life: 1.0
                    });
                }
            }
            
            function updateBlood() {
                for(let i=0; i<bloodParticles.length; i++) {
                    bloodParticles[i].life -= 0.0022;
                    if(bloodParticles[i].life <= 0.02 || bloodParticles[i].y > height + 60) {
                        bloodParticles.splice(i,1);
                        i--;
                    }
                }
            }
            
            function drawBlood() {
                for(let b of bloodParticles) {
                    ctx.save();
                    ctx.shadowBlur = 0;
                    ctx.beginPath();
                    ctx.ellipse(b.x, b.y, b.radius, b.radius * 0.65, 0, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(100, 14, 14, ${b.alpha * 0.92})`;
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(b.x-2, b.y-1.5, b.radius*0.5, b.radius*0.45, 0, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(50, 5, 5, 0.88)`;
                    ctx.fill();
                    ctx.restore();
                }
            }
            
            // ---------- DRAW REALISTIC GUN (semi-auto pistol) ----------
            function drawRealisticGun(x, y, angle, isFallen = false) {
                ctx.save();
                ctx.translate(x, y);
                if(angle) ctx.rotate(angle);
                ctx.fillStyle = "#232323";
                ctx.shadowBlur = 1.5;
                // main body
                ctx.fillRect(-24, -7, 48, 15);
                // slide serrations
                ctx.fillStyle = "#3a3a3a";
                ctx.fillRect(-20, -9, 38, 4);
                // barrel
                ctx.fillStyle = "#181818";
                ctx.fillRect(20, -5, 18, 9);
                // grip with texture
                ctx.beginPath();
                ctx.moveTo(-24, -3);
                ctx.lineTo(-32, 14);
                ctx.lineTo(-16, 14);
                ctx.fill();
                ctx.fillStyle = "#2e2a24";
                ctx.fillRect(-30, 5, 16, 9);
                // trigger guard
                ctx.beginPath();
                ctx.arc(-14, 0, 5.5, 0, Math.PI * 1.85);
                ctx.strokeStyle = "#444";
                ctx.lineWidth = 1.8;
                ctx.stroke();
                // trigger
                ctx.fillStyle = "#555";
                ctx.fillRect(-16, -1, 2, 5);
                // hammer
                ctx.fillStyle = "#2a2a2a";
                ctx.fillRect(6, -10, 7, 6);
                ctx.restore();
            }
            
            // ---------- DRAW HUMAN FIGURE (proportional, tall, arms connected, crown, Z on head) ----------
            function drawHumanFigure() {
                const hX = character.headX;
                const hY = character.headY;
                const nX = character.neckX;
                const nY = character.neckY;
                const bX = character.bodyX;
                const bY = character.bodyY;
                const isDead = hasActed;
                
                ctx.save();
                if(isDead && ragdollAngle !== 0) {
                    ctx.translate(bX, bY + 15);
                    ctx.rotate(ragdollAngle * 0.55);
                    ctx.translate(-bX, -(bY + 15));
                }
                
                // TORSO (elongated, realistic width)
                ctx.fillStyle = "#000000";
                ctx.fillRect(bX-38, bY-4, 76, 138);
                
                // PELVIS/LOWER BODY
                ctx.fillRect(bX-32, bY+128, 64, 32);
                
                // LEGS (long, straight)
                ctx.fillRect(bX-32, bY+148, 26, 78);
                ctx.fillRect(bX+6, bY+148, 26, 78);
                
                // NECK (connecting head to torso)
                ctx.fillRect(nX-14, nY-4, 28, 24);
                
                // HEAD (round, solid black)
                ctx.beginPath();
                ctx.arc(hX, hY, 36, 0, Math.PI*2);
                ctx.fillStyle = "#000000";
                ctx.fill();
                ctx.strokeStyle = "#1e1e1e";
                ctx.lineWidth = 1.2;
                ctx.stroke();
                
                // ----- CROWN on head (metallic, dark) -----
                ctx.fillStyle = "#4a3e30";
                ctx.beginPath();
                ctx.moveTo(hX-32, hY-26);
                ctx.lineTo(hX-20, hY-42);
                ctx.lineTo(hX-6, hY-30);
                ctx.lineTo(hX+6, hY-42);
                ctx.lineTo(hX+20, hY-30);
                ctx.lineTo(hX+32, hY-26);
                ctx.lineTo(hX+28, hY-18);
                ctx.lineTo(hX-28, hY-18);
                ctx.fill();
                ctx.fillStyle = "#7a684e";
                ctx.fillRect(hX-26, hY-26, 52, 9);
                // crown jewels (simple)
                ctx.fillStyle = "#9a8a6a";
                for(let i=-18; i<=18; i+=12) {
                    ctx.fillRect(hX+i, hY-37, 3, 12);
                }
                
                // Z letter on forehead (pale grey)
                ctx.font = `bold 44px "Courier New", monospace`;
                ctx.fillStyle = "#5a5a5a";
                ctx.fillText("Z", hX - 24, hY + 14);
                ctx.fillStyle = "#8a8a8a";
                ctx.fillText("Z", hX - 25, hY + 13);
                
                // ---------- LEFT ARM (connected, natural hang, tall) ----------
                ctx.fillStyle = "#000000";
                // upper arm
                ctx.beginPath();
                ctx.moveTo(character.leftShoulderX, character.leftShoulderY);
                ctx.lineTo(character.leftElbowX, character.leftElbowY);
                ctx.lineTo(character.leftElbowX + 12, character.leftElbowY + 8);
                ctx.lineTo(character.leftShoulderX + 8, character.leftShoulderY + 6);
                ctx.fill();
                // forearm
                ctx.beginPath();
                ctx.moveTo(character.leftElbowX, character.leftElbowY);
                ctx.lineTo(character.leftHandX, character.leftHandY);
                ctx.lineTo(character.leftHandX + 12, character.leftHandY + 6);
                ctx.lineTo(character.leftElbowX + 12, character.leftElbowY + 8);
                ctx.fill();
                
                // ---------- RIGHT ARM (bent, holding gun to head, properly connected) ----------
                // upper arm
                ctx.beginPath();
                ctx.moveTo(character.rightShoulderX, character.rightShoulderY);
                ctx.lineTo(character.rightElbowX, character.rightElbowY);
                ctx.lineTo(character.rightElbowX - 10, character.rightElbowY + 8);
                ctx.lineTo(character.rightShoulderX - 6, character.rightShoulderY + 6);
                ctx.fill();
                // forearm (pointing to head)
                ctx.beginPath();
                ctx.moveTo(character.rightElbowX, character.rightElbowY);
                ctx.lineTo(character.rightHandX, character.rightHandY);
                ctx.lineTo(character.rightHandX - 8, character.rightHandY + 6);
                ctx.lineTo(character.rightElbowX - 10, character.rightElbowY + 8);
                ctx.fill();
                
                // DRAW REALISTIC GUN (only if not dead, else fallen)
                if(!isDead) {
                    drawRealisticGun(character.gunX, character.gunY, character.gunAngle, false);
                } else {
                    drawRealisticGun(bX+44, bY+158, 1.3, true);
                }
                
                ctx.restore();
            }
            
            // ---------- SHOOT SEQUENCE (gunshot sound, blood, ragdoll, shake) ----------
            function startShootSequence() {
                if(hasActed) return;
                hasActed = true;
                actingPhase = 1;
                shakeIntensity = 19;
                blurAmount = 13.5;
                
                // play gunshot
                playGunshot();
                
                // massive blood from head
                const headPosX = character.headX;
                const headPosY = character.headY + 10;
                addBloodSplatter(headPosX, headPosY, true);
                
                // directional spray (exit wound)
                for(let i=0;i<45;i++) {
                    const angle = (Math.random() - 0.5) * Math.PI * 1.3;
                    const dist = Math.random() * 72;
                    bloodParticles.push({
                        x: headPosX + Math.cos(angle) * dist * 0.85,
                        y: headPosY + Math.sin(angle) * dist * 0.65 + 10,
                        radius: Math.random() * 8 + 3.5,
                        alpha: 0.96,
                        life: 1.0
                    });
                }
                
                // heavy pool under body
                for(let i=0;i<80;i++) {
                    bloodParticles.push({
                        x: character.bodyX + (Math.random() - 0.5) * 110,
                        y: character.bodyY + 75 + Math.random() * 70,
                        radius: Math.random() * 11 + 6,
                        alpha: 0.94,
                        life: 1.0
                    });
                }
                
                // ragdoll effect: body slumps forward and down
                ragdollAngle = -0.44;
                
                // disable button
                const btn = document.getElementById('carelessBtn');
                if(btn) {
                    btn.disabled = true;
                    btn.style.opacity = "0.35";
                    btn.style.cursor = "default";
                    btn.innerText = "---";
                }
            }
            
            // ---------- POST PROCESSING: SHAKE, BLUR, FADE OUT (no kick, just fade to black) ----------
            function updatePostProcessing() {
                if(actingPhase === 1) {
                    shakeIntensity *= 0.91;
                    blurAmount *= 0.93;
                    if(blurAmount < 0.7 && shakeIntensity < 0.5) {
                        actingPhase = 2;
                        fadeOpacity = 0;
                    }
                }
                else if(actingPhase === 2) {
                    fadeOpacity += 0.012;
                    if(fadeOpacity >= 1.0) {
                        fadeOpacity = 1.0;
                        actingPhase = 3;   // black screen, no kick
                    }
                }
                
                if(hasActed && actingPhase < 2) {
                    ragdollAngle += ( -0.49 - ragdollAngle ) * 0.085;
                    if(ragdollAngle < -0.49) ragdollAngle = -0.49;
                }
            }
            
            function applyShakeAndBlur() {
                if(actingPhase === 1 && (shakeIntensity > 0.6 || blurAmount > 0.4)) {
                    const dx = (Math.random() - 0.5) * shakeIntensity;
                    const dy = (Math.random() - 0.5) * shakeIntensity * 0.7;
                    canvas.style.transform = `translate(${dx}px, ${dy}px)`;
                    let blurValue = Math.min(blurAmount, 11);
                    if(blurValue > 0.3) {
                        canvas.style.filter = `blur(${blurValue}px)`;
                    } else {
                        canvas.style.filter = "none";
                    }
                } else {
                    canvas.style.transform = "";
                    if(actingPhase !== 1) canvas.style.filter = "";
                }
            }
            
            function drawFadeOverlay() {
                if(actingPhase >= 2 && fadeOpacity > 0) {
                    ctx.fillStyle = `rgba(0, 0, 0, ${Math.min(fadeOpacity, 0.99)})`;
                    ctx.fillRect(0, 0, width, height);
                }
            }
            
            // ---------- BACKGROUND: dark, minimal, industrial ----------
            function drawBackground() {
                const grad = ctx.createLinearGradient(0, 0, 0, height);
                grad.addColorStop(0, "#08080c");
                grad.addColorStop(1, "#12141c");
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, width, height);
                
                ctx.fillStyle = "rgba(28,28,38,0.22)";
                for(let i=0;i<160;i++) {
                    ctx.fillRect((i*131)%width, (i*83)%height, 1.2, 1.2);
                }
                // floor line / shadow
                ctx.beginPath();
                ctx.moveTo(0, height*0.76);
                ctx.lineTo(width, height*0.73);
                ctx.strokeStyle = "#1c1818";
                ctx.lineWidth = 2.5;
                ctx.stroke();
            }
            
            function drawBloodFloor() {
                for(let b of bloodParticles) {
                    ctx.beginPath();
                    ctx.ellipse(b.x, b.y, b.radius, b.radius * 0.6, 0, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(95, 14, 14, ${b.alpha * 0.9})`;
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(b.x-1.5, b.y-1, b.radius*0.5, b.radius*0.4, 0, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(45, 4, 4, 0.85)`;
                    ctx.fill();
                }
                if(hasActed) {
                    ctx.fillStyle = "#771515cc";
                    ctx.beginPath();
                    ctx.ellipse(character.headX, character.headY+48, 58, 28, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = "#541010cc";
                    ctx.beginPath();
                    ctx.ellipse(character.bodyX, character.bodyY+98, 75, 36, 0, 0, Math.PI*2);
                    ctx.fill();
                }
            }
            
            // ---------- RENDER LOOP ----------
            let animationFrame;
            
            function render() {
                if (!ctx) return;
                if (width === 0 || height === 0) {
                    resizeCanvas();
                    updateCharacterPositions();
                }
                
                updateCharacterPositions();
                updateBlood();
                updatePostProcessing();
                
                drawBackground();
                drawBloodFloor();
                drawHumanFigure();
                drawBlood();
                
                drawFadeOverlay();
                applyShakeAndBlur();
                
                animationFrame = requestAnimationFrame(render);
            }
            
            // ---------- INITIALIZATION ----------
            function init() {
                resizeCanvas();
                updateCharacterPositions();
                initAudio();
                
                const btn = document.getElementById('carelessBtn');
                if(btn) {
                    btn.addEventListener('click', (e) => {
                        e.preventDefault();
                        if(!hasActed) {
                            if(audioContext && audioContext.state === 'suspended') {
                                audioContext.resume().then(() => startShootSequence()).catch(()=>startShootSequence());
                            } else {
                                startShootSequence();
                            }
                        }
                    });
                }
                
                render();
            }
            
            init();
        })();
    </script>
</body>
</html>

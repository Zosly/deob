<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>untitled scene</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #0a0c12;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', 'SF Mono', monospace;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            background: #0f1219;
            cursor: crosshair;
        }

        /* no panels, no stupid corners, no buttons visible except one minimal trigger — but still required */
        .trigger-area {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 10;
            opacity: 0.65;
            transition: opacity 0.2s;
        }
        .trigger-area:hover {
            opacity: 1;
        }

        .silent-button {
            background: rgba(10, 10, 15, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(180, 40, 40, 0.6);
            color: #d9c8b2;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 10px 20px;
            border-radius: 32px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 0 8px rgba(0,0,0,0.4);
            text-transform: uppercase;
        }

        .silent-button:hover {
            background: rgba(40, 25, 25, 0.9);
            border-color: #b33e3e;
            color: #ffe0b5;
            box-shadow: 0 0 14px rgba(180, 40, 40, 0.3);
        }

        .silent-button:active {
            transform: scale(0.96);
        }

        /* no decorative panels, no banners, no messages except pure canvas */
        @media (max-width: 700px) {
            .trigger-area {
                bottom: 18px;
                right: 18px;
            }
            .silent-button {
                font-size: 0.7rem;
                padding: 6px 14px;
            }
        }
    </style>
</head>
<body>
    <canvas id="bleakCanvas"></canvas>
    <div class="trigger-area">
        <button id="finalActBtn" class="silent-button">i don't care</button>
    </div>

    <script>
        (function() {
            // ---------- FULLSCREEN CANVAS ----------
            const canvas = document.getElementById('bleakCanvas');
            const ctx = canvas.getContext('2d');
            
            let width, height;
            
            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }
            window.addEventListener('resize', () => {
                resizeCanvas();
                redrawImmediate = true;
            });
            resizeCanvas();
            
            // ---------- STATE ----------
            let hasActed = false;          // if the irreversible act happened
            let actTimer = 0;              // visual aftermath timer (frames)
            
            // ---------- DIE WORDS (random place, only red or black) ----------
            let dieWords = [];
            const MAX_DIE_WORDS = 22;
            let spawnInterval = null;
            
            // helper random
            function randRange(min, max) {
                return Math.floor(Math.random() * (max - min + 1) + min);
            }
            
            // spawn "DIE" word at random canvas position, color: red (#b12222) or black (#111111)
            function spawnDieWord() {
                if (!canvas || width === 0) return;
                const x = randRange(40, width - 60);
                const y = randRange(50, height - 70);
                const colorChoice = Math.random() < 0.5 ? "#b12222" : "#111111";
                dieWords.push({
                    x: x,
                    y: y,
                    color: colorChoice,
                    size: randRange(22, 48),
                    life: 1.0,
                    driftX: (Math.random() - 0.5) * 0.4,
                    driftY: (Math.random() - 0.5) * 0.3,
                    createdAt: Date.now()
                });
                if (dieWords.length > MAX_DIE_WORDS) dieWords.shift();
            }
            
            // periodic spawner (only if not acted)
            function startDieSpawner() {
                if (spawnInterval) clearInterval(spawnInterval);
                spawnInterval = setInterval(() => {
                    if (!hasActed && document.body.contains(canvas)) {
                        spawnDieWord();
                        // occasionally spawn an extra for density
                        if (Math.random() < 0.4 && dieWords.length < MAX_DIE_WORDS) spawnDieWord();
                    }
                }, 2100);
                // initial words for atmosphere
                for (let i = 0; i < 6; i++) setTimeout(() => spawnDieWord(), i * 240);
            }
            
            // remove old die words after lifespan
            function cullDieWords() {
                const now = Date.now();
                for (let i = dieWords.length-1; i >= 0; i--) {
                    if (now - dieWords[i].createdAt > 24000) {
                        dieWords.splice(i,1);
                    }
                }
                if (!hasActed && dieWords.length < 4 && spawnInterval) {
                    for(let i=0;i<2;i++) spawnDieWord();
                }
            }
            
            // ---------- CHARACTER & GUN: man pointing gun to his own head ----------
            // all coordinates relative to viewport (percentage-based but we use absolute)
            // we define a normalized anchor system: centerX = width/2, baseY = height*0.65 etc
            let character = {
                headX: 0, headY: 0,
                bodyX: 0, bodyY: 0,
                gunMuzzleX: 0, gunMuzzleY: 0
            };
            
            function updateCharacterPositions() {
                character.headX = width * 0.5;
                character.headY = height * 0.38;
                character.bodyX = width * 0.5;
                character.bodyY = height * 0.65;
                // gun tip near right temple
                character.gunMuzzleX = character.headX + 38;
                character.gunMuzzleY = character.headY - 6;
            }
            
            // drawing the entire scene: figure, gun, "Suicide" word wrapped around body
            // plus random DIE words already drawn separately
            function drawFigureAndGun() {
                if (!ctx) return;
                const hX = character.headX;
                const hY = character.headY;
                const bX = character.bodyX;
                const bY = character.bodyY;
                const isAfterAct = hasActed;
                
                // ---------- SURROUNDING "SUICIDE" text around the body / guy (multiple instances) ----------
                ctx.save();
                ctx.font = `bold ${isAfterAct ? 20 : 18}px "Courier New", monospace`;
                ctx.shadowBlur = 0;
                ctx.textAlign = "center";
                
                // Floating "SUICIDE" ring around torso (elliptic orbit)
                const angle = (Date.now() * 0.0022) % (Math.PI * 2);
                const radiusX = 74;
                const radiusY = 48;
                const orbitX = bX + Math.cos(angle) * radiusX;
                const orbitY = bY + Math.sin(angle * 1.2) * radiusY - 12;
                ctx.fillStyle = isAfterAct ? "#a14a4a" : "#7a3f3f";
                ctx.fillText("SUICIDE", orbitX, orbitY);
                
                // additional "SUICIDE" words wrapping the body: near shoulder, belt, arm area
                ctx.font = "16px 'Courier New'";
                ctx.fillStyle = isAfterAct ? "#bf5e5e" : "#993e4a";
                ctx.fillText("SUICIDE", bX - 68, hY + 42);
                ctx.fillText("SUICIDE", bX + 68, hY + 88);
                ctx.font = "italic 18px monospace";
                ctx.fillStyle = isAfterAct ? "#cf6a6a" : "#ac4a5a";
                ctx.fillText("SUICIDE", bX - 24, bY + 38);
                ctx.font = "bold 15px monospace";
                ctx.fillStyle = "#bc5a5a";
                ctx.fillText("SUICIDE", bX + 45, hY + 124);
                // around the head/neck area
                ctx.font = "14px monospace";
                ctx.fillStyle = "#ad5353";
                ctx.fillText("SUICIDE", hX - 48, hY - 8);
                ctx.fillText("SUICIDE", hX + 52, hY + 4);
                
                // ---------- DRAW THE BODY (silent, tense figure) ----------
                // Torso (dark muted)
                ctx.fillStyle = "#1f1c1a";
                ctx.fillRect(bX-42, hY+42, 84, 126);
                // legs (somber)
                ctx.fillStyle = "#141210";
                ctx.fillRect(bX-34, hY+162, 26, 70);
                ctx.fillRect(bX+8, hY+162, 26, 70);
                // neck
                ctx.fillStyle = "#5f4a38";
                ctx.fillRect(hX-15, hY+26, 30, 20);
                // head (pale, grim)
                ctx.beginPath();
                ctx.arc(hX, hY, 32, 0, Math.PI*2);
                ctx.fillStyle = "#dbbc97";
                ctx.fill();
                ctx.strokeStyle = "#3d2a1c";
                ctx.lineWidth = 1.8;
                ctx.stroke();
                
                // face: deadpan expression (empty eyes)
                ctx.fillStyle = "#1e1915";
                ctx.beginPath();
                ctx.arc(hX-13, hY-5, 5, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(hX+13, hY-5, 5, 0, Math.PI*2);
                ctx.fill();
                // neutral mouth line
                ctx.beginPath();
                ctx.moveTo(hX-12, hY+12);
                ctx.lineTo(hX+12, hY+12);
                ctx.strokeStyle = "#442a1a";
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // RIGHT ARM & GUN (pointing to head)
                if(!isAfterAct) {
                    // arm reaching upward to temple
                    ctx.beginPath();
                    ctx.moveTo(bX+32, hY+54);
                    ctx.quadraticCurveTo(bX+62, hY+28, character.gunMuzzleX-12, character.gunMuzzleY+2);
                    ctx.lineTo(character.gunMuzzleX-20, character.gunMuzzleY+8);
                    ctx.fillStyle = "#6e5340";
                    ctx.fill();
                    
                    // gun (dark grey metallic, serious)
                    ctx.fillStyle = "#2e2a28";
                    ctx.fillRect(character.gunMuzzleX-22, character.gunMuzzleY-5, 28, 12);
                    ctx.fillStyle = "#4a4240";
                    ctx.fillRect(character.gunMuzzleX-8, character.gunMuzzleY-8, 12, 18);
                    ctx.fillStyle = "#1f1d1b";
                    ctx.fillRect(character.gunMuzzleX-4, character.gunMuzzleY-2, 20, 7);
                    // trigger guard
                    ctx.beginPath();
                    ctx.arc(character.gunMuzzleX-16, character.gunMuzzleY+3, 4, 0, Math.PI*2);
                    ctx.fillStyle = "#665544";
                    ctx.fill();
                } 
                else {
                    // AFTER SHOT: slumped figure, blood, gun falls, visceral change
                    ctx.fillStyle = "#1f1a17";
                    ctx.fillRect(bX-44, hY+45, 88, 118);
                    // head tilted back with wound
                    ctx.save();
                    ctx.translate(hX+4, hY+10);
                    ctx.rotate(0.35);
                    ctx.beginPath();
                    ctx.arc(0, 0, 32, 0, Math.PI*2);
                    ctx.fillStyle = "#c8aa86";
                    ctx.fill();
                    ctx.fillStyle = "#831a1a";
                    ctx.beginPath();
                    ctx.ellipse(14, -14, 14, 9, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = "#a52222";
                    for(let s=0; s<14; s++) {
                        ctx.beginPath();
                        ctx.arc(12 + (Math.random()*12-6), -18 + (Math.random()*18), Math.random()*4+2, 0, Math.PI*2);
                        ctx.fill();
                    }
                    ctx.restore();
                    
                    // blood traces
                    ctx.fillStyle = "#8b2222";
                    ctx.beginPath();
                    ctx.ellipse(hX+6, hY+48, 38, 18, 0, 0, Math.PI*2);
                    ctx.fill();
                    // fallen gun on ground
                    ctx.fillStyle = "#2f2b28";
                    ctx.fillRect(bX+30, hY+180, 40, 10);
                    ctx.fillRect(bX+46, hY+172, 12, 18);
                    // distorted "SUICIDE" echo
                    ctx.font = "bold 18px monospace";
                    ctx.fillStyle = "#be5a5a";
                    ctx.fillText("SUICIDE", hX-42, hY+120);
                    ctx.fillText("SILENCE", bX-30, bY+48);
                }
                
                // LEFT ARM (hanging, tense)
                ctx.beginPath();
                ctx.moveTo(bX-44, hY+58);
                ctx.lineTo(bX-78, hY+92);
                ctx.lineTo(bX-52, hY+108);
                ctx.fillStyle = "#5f4736";
                ctx.fill();
                
                // additional "SUICIDE" on chest overlay for wrapping
                ctx.font = "bold 15px monospace";
                ctx.fillStyle = isAfterAct ? "#cf5a5a" : "#ab4a4a";
                ctx.fillText("SUICIDE", bX, hY+85);
                
                ctx.restore();
            }
            
            // draw all "DIE" words with slight drift (only red or black)
            function drawAllDieWords() {
                for (let w of dieWords) {
                    ctx.save();
                    ctx.font = `900 ${w.size}px "Courier New", monospace`;
                    ctx.shadowBlur = 3;
                    ctx.shadowColor = "rgba(0,0,0,0.5)";
                    let offsetX = 0, offsetY = 0;
                    if (hasActed) {
                        offsetX = (Math.sin(Date.now() * 0.022 + w.driftX * 10) * 3.2);
                        offsetY = (Math.cos(Date.now() * 0.025 + w.driftY * 8) * 2.4);
                    } else {
                        offsetX = Math.sin(Date.now() * 0.006 + w.driftX * 4) * 1.2;
                        offsetY = Math.cos(Date.now() * 0.008 + w.driftY * 4) * 1.0;
                    }
                    ctx.fillStyle = w.color;
                    ctx.fillText("DIE", w.x + offsetX, w.y + offsetY);
                    // small atmospheric cracks (optional)
                    if(w.color === "#b12222") {
                        ctx.fillStyle = "#8a2a2a";
                        ctx.font = `${w.size-12}px monospace`;
                        ctx.fillText("x", w.x + w.size*0.45, w.y-6);
                    }
                    ctx.restore();
                }
            }
            
            // ---------- BACKGROUND: stark gradient / dark industrial ----------
            function drawBackground() {
                const grad = ctx.createLinearGradient(0, 0, 0, height);
                grad.addColorStop(0, "#101218");
                grad.addColorStop(1, "#191c24");
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, width, height);
                // subtle grain / texture
                ctx.fillStyle = "rgba(0,0,0,0.08)";
                for(let i=0;i<120;i++) {
                    ctx.fillRect( (i*83)%width, (i*47)%height, 1.5, 1.5);
                }
                // faint atmosphere line
                ctx.beginPath();
                ctx.moveTo(0, height*0.7);
                ctx.lineTo(width, height*0.65);
                ctx.strokeStyle = "#302a2a";
                ctx.lineWidth = 1;
                ctx.stroke();
            }
            
            // ---------- THE FATAL ACT (person shoots himself) ----------
            function executeFinalAct() {
                if (hasActed) return;
                hasActed = true;
                actTimer = 45;
                
                // stop spawning additional DIE words
                if (spawnInterval) {
                    clearInterval(spawnInterval);
                    spawnInterval = null;
                }
                
                // add a subtle full-screen shudder for 2 frames
                let shakeFrames = 0;
                function screenShake() {
                    if(shakeFrames < 6) {
                        canvas.style.transform = `translate(${Math.random()*4-2}px, ${Math.random()*3-1.5}px)`;
                        setTimeout(() => { canvas.style.transform = ""; }, 50);
                        shakeFrames++;
                        requestAnimationFrame(() => setTimeout(screenShake, 35));
                    }
                }
                screenShake();
                
                // change button text to irreversible state
                const btn = document.getElementById('finalActBtn');
                if(btn) {
                    btn.innerText = "silenced";
                    btn.disabled = true;
                    btn.style.opacity = "0.5";
                    btn.style.cursor = "default";
                }
            }
            
            // ---------- ANIMATION LOOP (fullscreen, no UI panels) ----------
            let redrawImmediate = true;
            
            function animateScene() {
                if (!ctx) return;
                if (width === 0 || height === 0) {
                    resizeCanvas();
                    return;
                }
                
                // update positions based on current canvas size
                updateCharacterPositions();
                
                // culling and optional respawn (if not acted)
                if (!hasActed) {
                    cullDieWords();
                    // if dieWords become too few, respawn elegantly
                    if (dieWords.length < 5 && spawnInterval) {
                        for(let i=0;i<2;i++) spawnDieWord();
                    }
                } else {
                    if (actTimer > 0) actTimer--;
                }
                
                // draw everything
                drawBackground();
                drawAllDieWords();
                drawFigureAndGun();
                
                // final overlay words if acted (but no silly banners, just text floating)
                if (hasActed) {
                    ctx.font = "italic 16px 'Courier New'";
                    ctx.fillStyle = "#a54e4e";
                    ctx.shadowBlur = 0;
                    ctx.fillText("SILENCE", character.headX-45, character.headY+155);
                    ctx.fillStyle = "#692c2c";
                    ctx.font = "bold 13px monospace";
                    ctx.fillText("SHOT", character.gunMuzzleX-32, character.gunMuzzleY+28);
                }
                
                // minimalistic no borders, no panels, no extra decorations
                requestAnimationFrame(animateScene);
            }
            
            // ---------- SETUP: RESPAWN HANDLING & BUTTON ----------
            function setup() {
                resizeCanvas();
                startDieSpawner();
                // add one or two initial words
                for(let i=0;i<5;i++) spawnDieWord();
                
                const actionButton = document.getElementById('finalActBtn');
                if (actionButton) {
                    actionButton.addEventListener('click', (e) => {
                        e.preventDefault();
                        executeFinalAct();
                    });
                }
                
                animateScene();
            }
            
            // run setup
            setup();
            
            // ensure canvas resize on orientation changes
            window.addEventListener('resize', () => {
                resizeCanvas();
                updateCharacterPositions();
            });
        })();
    </script>
</body>
</html>

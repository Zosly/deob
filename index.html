<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Requiem</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #000000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            background: #0a0a0c;
            cursor: crosshair;
        }

        /* Minimal button - black, sharp, no nonsense */
        .trigger-wrapper {
            position: fixed;
            bottom: 32px;
            right: 32px;
            z-index: 20;
            opacity: 0.85;
            transition: opacity 0.2s;
        }
        .trigger-wrapper:hover {
            opacity: 1;
        }

        .black-button {
            background: #000000;
            border: 1.5px solid #2c2c2c;
            color: #cccccc;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            font-weight: 600;
            padding: 12px 28px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.15s ease;
            text-transform: uppercase;
            box-shadow: none;
            border-radius: 0px;
        }

        .black-button:hover {
            background: #111111;
            border-color: #6a1a1a;
            color: #e0e0e0;
        }

        .black-button:active {
            transform: scale(0.97);
        }

        @media (max-width: 640px) {
            .trigger-wrapper {
                bottom: 20px;
                right: 20px;
            }
            .black-button {
                padding: 8px 20px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <canvas id="brutalCanvas"></canvas>
    <div class="trigger-wrapper">
        <button id="carelessBtn" class="black-button">i don't care</button>
    </div>

    <script>
        (function() {
            // ---------- FULLSCREEN CANVAS ----------
            const canvas = document.getElementById('brutalCanvas');
            const ctx = canvas.getContext('2d');
            
            let width, height;
            
            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }
            window.addEventListener('resize', () => {
                resizeCanvas();
                updateCharacterPositions();
            });
            resizeCanvas();
            
            // ---------- AUDIO: Gunshot (Web Audio API - realistic) ----------
            let audioContext = null;
            let gunshotBuffer = null;
            
            function initAudio() {
                try {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    // Generate a realistic gunshot using oscillators + noise
                    const sampleRate = audioContext.sampleRate;
                    const duration = 1.2;
                    const bufferSize = sampleRate * duration;
                    const buffer = audioContext.createBuffer(1, bufferSize, sampleRate);
                    const data = buffer.getChannelData(0);
                    
                    // Envelope: sharp transient + decay
                    for (let i = 0; i < bufferSize; i++) {
                        let t = i / sampleRate; // time in seconds
                        let envelope = 0;
                        if (t < 0.01) envelope = t / 0.01;
                        else envelope = Math.exp(- (t - 0.01) * 35);
                        
                        // noise + click + low frequency thump
                        let noise = (Math.random() * 2 - 1) * 0.7;
                        let crack = 0;
                        if (t < 0.008) crack = Math.sin(3.14159 * t / 0.008) * 0.9;
                        let thump = Math.sin(2 * Math.PI * 80 * t) * Math.exp(-t * 25) * 0.5;
                        let value = (noise * 0.8 + crack * 0.9 + thump) * envelope;
                        data[i] = Math.max(-0.9, Math.min(0.9, value));
                    }
                    gunshotBuffer = buffer;
                } catch(e) { console.warn("audio not supported"); }
            }
            
            function playGunshot() {
                if (!audioContext || !gunshotBuffer) {
                    // lazy init fallback
                    if (!audioContext) initAudio();
                    if (!gunshotBuffer) return;
                }
                // Resume context if suspended (browser autoplay policy)
                if (audioContext.state === 'suspended') {
                    audioContext.resume().then(() => {
                        const source = audioContext.createBufferSource();
                        source.buffer = gunshotBuffer;
                        source.connect(audioContext.destination);
                        source.start();
                    }).catch(e=>console.warn);
                } else {
                    const source = audioContext.createBufferSource();
                    source.buffer = gunshotBuffer;
                    source.connect(audioContext.destination);
                    source.start();
                }
            }
            
            // ---------- STATE ----------
            let hasActed = false;           
            let actingPhase = 0;            // 0 = idle, 1 = shake/blur active, 2 = fade out
            let shakeIntensity = 0;
            let blurAmount = 0;
            let fadeOpacity = 0;             // 0 visible -> 1 blackout
            let bloodParticles = [];
            let ragdollAngle = 0;
            let ragdollOffsetY = 0;
            let frameCounter = 0;
            
            // ---------- CHARACTER: realistic proportions, arms tall, head connected to body, crown ----------
            let character = {
                headX: 0, headY: 0,
                bodyX: 0, bodyY: 0,
                leftArmX1: 0, leftArmY1: 0, leftArmX2: 0, leftArmY2: 0,
                rightArmX1: 0, rightArmY1: 0, rightArmX2: 0, rightArmY2: 0,
                gunX: 0, gunY: 0, gunAngle: 0
            };
            
            function updateCharacterPositions() {
                // head and body connection: body starts just below head (no gap)
                character.headX = width * 0.5;
                character.headY = height * 0.42;     // lowered to connect better with torso
                character.bodyX = width * 0.5;
                character.bodyY = character.headY + 32;  // neck/torso starts directly
                
                // TALL ARMS (elongated rectangles)
                // left arm (hanging down, tall)
                character.leftArmX1 = character.bodyX - 38;
                character.leftArmY1 = character.bodyY - 8;
                character.leftArmX2 = character.bodyX - 70;
                character.leftArmY2 = character.bodyY + 58;
                
                // right arm (bent upwards holding gun to head, realistic elongated)
                character.rightArmX1 = character.bodyX + 34;
                character.rightArmY1 = character.bodyY - 6;
                character.rightArmX2 = character.bodyX + 68;
                character.rightArmY2 = character.headY - 2;
                
                // Realistic gun: positioned at temple with proper angle
                character.gunX = character.headX + 42;
                character.gunY = character.headY - 4;
                character.gunAngle = -0.12; // slight tilt
            }
            
            // ---------- BLOOD SYSTEM (deep red, realistic splatter, flows on floor) ----------
            function addBloodSplatter(x, y, isIntense = true) {
                const count = isIntense ? 42 : 22;
                for(let i=0; i<count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const distance = Math.random() * (isIntense ? 80 : 50);
                    const offsetX = Math.cos(angle) * distance * (Math.random() * 0.7 + 0.3);
                    const offsetY = Math.sin(angle) * distance * 0.5 + Math.random() * 12;
                    bloodParticles.push({
                        x: x + offsetX,
                        y: y + offsetY + 6,
                        radius: Math.random() * 7 + 3.5,
                        alpha: 0.92,
                        life: 1.0
                    });
                }
                // heavy pool under head and body
                for(let i=0;i<48;i++) {
                    bloodParticles.push({
                        x: x + (Math.random() - 0.5) * 110,
                        y: y + 28 + Math.random() * 45,
                        radius: Math.random() * 9 + 5,
                        alpha: 0.94,
                        life: 1.0
                    });
                }
            }
            
            function updateBlood() {
                for(let i=0; i<bloodParticles.length; i++) {
                    bloodParticles[i].life -= 0.0025;
                    if(bloodParticles[i].life <= 0.02 || bloodParticles[i].y > height + 50) {
                        bloodParticles.splice(i,1);
                        i--;
                    }
                }
            }
            
            function drawBlood() {
                for(let b of bloodParticles) {
                    ctx.save();
                    ctx.shadowBlur = 0;
                    ctx.beginPath();
                    ctx.ellipse(b.x, b.y, b.radius, b.radius * 0.65, 0, 0, Math.PI*2);
                    // deep crimson realistic
                    ctx.fillStyle = `rgba(105, 15, 15, ${b.alpha * 0.92})`;
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(b.x-2, b.y-1, b.radius*0.5, b.radius*0.45, 0, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(55, 5, 5, 0.85)`;
                    ctx.fill();
                    ctx.restore();
                }
            }
            
            // ---------- DRAW REALISTIC GUN (detailed) ----------
            function drawRealisticGun(x, y, angle, isFallen = false) {
                ctx.save();
                ctx.translate(x, y);
                if(angle) ctx.rotate(angle);
                ctx.fillStyle = "#1f1f1f";
                ctx.shadowBlur = 2;
                ctx.fillRect(-22, -6, 44, 14);
                // slide
                ctx.fillStyle = "#2c2c2c";
                ctx.fillRect(-18, -8, 36, 4);
                // barrel
                ctx.fillStyle = "#151515";
                ctx.fillRect(18, -4, 16, 8);
                // grip
                ctx.beginPath();
                ctx.moveTo(-22, -2);
                ctx.lineTo(-28, 12);
                ctx.lineTo(-14, 12);
                ctx.fill();
                ctx.fillStyle = "#3a2a20";
                ctx.fillRect(-26, 4, 14, 8);
                // trigger guard
                ctx.beginPath();
                ctx.arc(-12, 0, 5, 0, Math.PI * 1.8);
                ctx.strokeStyle = "#444";
                ctx.lineWidth = 1.5;
                ctx.stroke();
                // hammer
                ctx.fillStyle = "#2a2a2a";
                ctx.fillRect(8, -9, 6, 5);
                ctx.restore();
            }
            
            // ---------- DRAW BLACK FIGURE (tall arms, crown, no features, Z on head) ----------
            function drawBlackFigure() {
                const hX = character.headX;
                const hY = character.headY;
                const bX = character.bodyX;
                const bY = character.bodyY;
                const isDead = hasActed;
                
                ctx.save();
                if(isDead && ragdollAngle !== 0) {
                    ctx.translate(bX, bY + 12);
                    ctx.rotate(ragdollAngle * 0.55);
                    ctx.translate(-bX, -(bY + 12));
                }
                
                // TORSO (solid black, realistic width)
                ctx.fillStyle = "#000000";
                ctx.fillRect(bX-42, bY-8, 84, 128);
                
                // LEGS (straight)
                ctx.fillStyle = "#000000";
                ctx.fillRect(bX-34, bY+112, 28, 72);
                ctx.fillRect(bX+6, bY+112, 28, 72);
                
                // NECK (smooth transition)
                ctx.fillRect(hX-15, hY+24, 30, 20);
                
                // HEAD (round, solid black)
                ctx.beginPath();
                ctx.arc(hX, hY, 34, 0, Math.PI*2);
                ctx.fillStyle = "#000000";
                ctx.fill();
                ctx.strokeStyle = "#1a1a1a";
                ctx.lineWidth = 1;
                ctx.stroke();
                
                // ----- CROWN on head (regal, dark metallic) -----
                ctx.fillStyle = "#3a3028";
                ctx.beginPath();
                ctx.moveTo(hX-28, hY-24);
                ctx.lineTo(hX-18, hY-38);
                ctx.lineTo(hX-6, hY-28);
                ctx.lineTo(hX+6, hY-38);
                ctx.lineTo(hX+18, hY-28);
                ctx.lineTo(hX+28, hY-24);
                ctx.lineTo(hX+24, hY-16);
                ctx.lineTo(hX-24, hY-16);
                ctx.fill();
                ctx.fillStyle = "#6a5a48";
                ctx.fillRect(hX-22, hY-24, 44, 8);
                ctx.fillStyle = "#8a7a62";
                for(let i=-18; i<=18; i+=12) {
                    ctx.fillRect(hX+i, hY-34, 3, 10);
                }
                
                // Z letter on forehead (dark grey)
                ctx.font = `bold 42px "Courier New", monospace`;
                ctx.fillStyle = "#4a4a4a";
                ctx.fillText("Z", hX - 22, hY + 14);
                ctx.fillStyle = "#7a7a7a";
                ctx.fillText("Z", hX - 23, hY + 13);
                
                // LEFT ARM (tall rectangular, natural)
                ctx.fillStyle = "#000000";
                ctx.fillRect(character.leftArmX1, character.leftArmY1, 24, 42);
                ctx.fillRect(character.leftArmX2-6, character.leftArmY2+8, 28, 38);
                
                // RIGHT ARM (tall, reaching to head with gun)
                ctx.fillStyle = "#000000";
                ctx.fillRect(character.rightArmX1, character.rightArmY1, 26, 40);
                ctx.fillRect(character.rightArmX2-12, character.rightArmY2-2, 28, 32);
                
                // draw realistic gun (if not dead)
                if(!isDead) {
                    drawRealisticGun(character.gunX, character.gunY, character.gunAngle, false);
                } else {
                    // fallen gun near body
                    drawRealisticGun(bX+46, bY+148, 1.2, true);
                }
                ctx.restore();
            }
            
            // ---------- SHOOT SEQUENCE (gunshot sound, blood, ragdoll, shake) ----------
            function startShootSequence() {
                if(hasActed) return;
                hasActed = true;
                actingPhase = 1;
                shakeIntensity = 18;
                blurAmount = 14;
                frameCounter = 0;
                
                // play gunshot sound
                playGunshot();
                
                // massive realistic blood from head
                const headPosX = character.headX;
                const headPosY = character.headY + 8;
                addBloodSplatter(headPosX, headPosY, true);
                
                // additional directional blood spray (exit wound style)
                for(let i=0;i<38;i++) {
                    const angle = (Math.random() - 0.5) * Math.PI * 1.2;
                    const dist = Math.random() * 68;
                    bloodParticles.push({
                        x: headPosX + Math.cos(angle) * dist * 0.8,
                        y: headPosY + Math.sin(angle) * dist * 0.7 + 8,
                        radius: Math.random() * 8 + 3,
                        alpha: 0.96,
                        life: 1.0
                    });
                }
                
                // heavy pool under body and head
                for(let i=0;i<70;i++) {
                    bloodParticles.push({
                        x: character.bodyX + (Math.random() - 0.5) * 100,
                        y: character.bodyY + 55 + Math.random() * 60,
                        radius: Math.random() * 10 + 5,
                        alpha: 0.93,
                        life: 1.0
                    });
                }
                
                // ragdoll physics: body slumps forward and down
                ragdollAngle = -0.42;
                ragdollOffsetY = 22;
                
                // disable button & change text
                const btn = document.getElementById('carelessBtn');
                if(btn) {
                    btn.disabled = true;
                    btn.style.opacity = "0.35";
                    btn.style.cursor = "default";
                    btn.innerText = "---";
                }
            }
            
            // ---------- POST PROCESSING: SHAKE, BLUR, FADE OUT (no kick) ----------
            function updatePostProcessing() {
                if(actingPhase === 1) {
                    shakeIntensity *= 0.91;
                    blurAmount *= 0.93;
                    frameCounter++;
                    if(blurAmount < 0.7 && shakeIntensity < 0.5) {
                        actingPhase = 2;   // start fade out to black
                        fadeOpacity = 0;
                    }
                }
                else if(actingPhase === 2) {
                    fadeOpacity += 0.012;
                    if(fadeOpacity >= 1.0) {
                        fadeOpacity = 1.0;
                        actingPhase = 3;   // frozen blackout, no kick, just stays black
                    }
                }
                
                // ragdoll settling after death
                if(hasActed && actingPhase < 2) {
                    ragdollAngle += ( -0.48 - ragdollAngle ) * 0.08;
                    if(ragdollAngle < -0.49) ragdollAngle = -0.49;
                }
            }
            
            function applyShakeAndBlur() {
                if(actingPhase === 1 && (shakeIntensity > 0.6 || blurAmount > 0.4)) {
                    const dx = (Math.random() - 0.5) * shakeIntensity;
                    const dy = (Math.random() - 0.5) * shakeIntensity * 0.7;
                    canvas.style.transform = `translate(${dx}px, ${dy}px)`;
                    let blurValue = Math.min(blurAmount, 10);
                    if(blurValue > 0.3) {
                        canvas.style.filter = `blur(${blurValue}px)`;
                    } else {
                        canvas.style.filter = "none";
                    }
                } else {
                    canvas.style.transform = "";
                    if(actingPhase !== 1) canvas.style.filter = "";
                }
            }
            
            function drawFadeOverlay() {
                if(actingPhase >= 2 && fadeOpacity > 0) {
                    ctx.fillStyle = `rgba(0, 0, 0, ${Math.min(fadeOpacity, 0.99)})`;
                    ctx.fillRect(0, 0, width, height);
                }
            }
            
            // ---------- BACKGROUND: dark, moody, industrial ----------
            function drawBackground() {
                const grad = ctx.createLinearGradient(0, 0, 0, height);
                grad.addColorStop(0, "#0a0a0f");
                grad.addColorStop(1, "#11131c");
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, width, height);
                // subtle grain texture
                ctx.fillStyle = "rgba(30,30,40,0.25)";
                for(let i=0;i<140;i++) {
                    ctx.fillRect((i*131)%width, (i*87)%height, 1.2, 1.2);
                }
                // floor shadow line
                ctx.beginPath();
                ctx.moveTo(0, height*0.74);
                ctx.lineTo(width, height*0.71);
                ctx.strokeStyle = "#1c1818";
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            
            function drawBloodFloor() {
                for(let b of bloodParticles) {
                    ctx.beginPath();
                    ctx.ellipse(b.x, b.y, b.radius, b.radius * 0.6, 0, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(95, 14, 14, ${b.alpha * 0.9})`;
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(b.x-1.5, b.y-1, b.radius*0.5, b.radius*0.4, 0, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(45, 4, 4, 0.85)`;
                    ctx.fill();
                }
                // additional deep puddle after death
                if(hasActed) {
                    ctx.fillStyle = "#6f1515cc";
                    ctx.beginPath();
                    ctx.ellipse(character.headX, character.headY+42, 52, 26, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = "#4a0c0ccc";
                    ctx.beginPath();
                    ctx.ellipse(character.bodyX, character.bodyY+85, 68, 34, 0, 0, Math.PI*2);
                    ctx.fill();
                }
            }
            
            // ---------- RENDER LOOP ----------
            let animationFrame;
            
            function render() {
                if (!ctx) return;
                if (width === 0 || height === 0) {
                    resizeCanvas();
                    updateCharacterPositions();
                }
                
                updateCharacterPositions();
                updateBlood();
                updatePostProcessing();
                
                drawBackground();
                drawBloodFloor();
                drawBlackFigure();
                drawBlood();   // fresh splatter overlay
                
                drawFadeOverlay();
                applyShakeAndBlur();
                
                animationFrame = requestAnimationFrame(render);
            }
            
            // ---------- AUDIO & BUTTON INIT ----------
            function init() {
                resizeCanvas();
                updateCharacterPositions();
                initAudio();   // prepare gunshot buffer
                
                // ensure audio context can be resumed on first user interaction (button click)
                const btn = document.getElementById('carelessBtn');
                if(btn) {
                    btn.addEventListener('click', (e) => {
                        e.preventDefault();
                        if(!hasActed) {
                            // resume audio if needed
                            if(audioContext && audioContext.state === 'suspended') {
                                audioContext.resume().then(() => startShootSequence()).catch(()=>startShootSequence());
                            } else {
                                startShootSequence();
                            }
                        }
                    });
                }
                
                render();
            }
            
            init();
        })();
    </script>
</body>
</html>
